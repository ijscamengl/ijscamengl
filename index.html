<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone - Discord Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white h-screen flex flex-col">

    <header class="h-16 border-b flex items-center justify-between px-6 shrink-0">
        <div class="text-2xl font-black italic tracking-tighter">TikTok</div>
        <div class="flex items-center space-x-4">
            <button onclick="document.getElementById('fileInput').click()" class="bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded font-bold text-sm">+ Upload</button>
            <input type="file" id="fileInput" class="hidden" accept="video/*" onchange="handleUpload(event)">
            
            <button id="loginBtn" onclick="loginWithDiscord()" class="bg-[#fe2c55] text-white px-6 py-1.5 rounded font-bold text-sm">Log in with Discord</button>
            
            <div id="userProfile" class="hidden flex items-center space-x-2">
                <span id="userName" class="font-bold text-sm"></span>
                <img id="userAvatar" class="w-8 h-8 rounded-full border" src="" alt="Avatar">
                <button onclick="logout()" class="text-xs text-gray-400 underline">Logout</button>
            </div>
        </div>
    </header>

    <main id="feed" class="flex-1 overflow-y-scroll bg-black flex flex-col items-center snap-y snap-mandatory">
        <div class="h-full flex items-center text-white italic opacity-50">Upload a video to start the feed...</div>
    </main>

    <script>
        const CLIENT_ID = '1484189679762014352';
        const REDIRECT_URI = window.location.href.split('#')[0]; // Auto-detects your URL

        // 1. Redirect to Discord
        function loginWithDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        // 2. Check for Token on Page Load
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                fetchDiscordUser(accessToken);
                // Clean the URL so the token doesn't stay in the address bar
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (localStorage.getItem('user_data')) {
                showUser(JSON.parse(localStorage.getItem('user_data')));
            }
        };

        async function fetchDiscordUser(token) {
            const response = await fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            });
            const data = await response.json();
            localStorage.setItem('user_data', JSON.stringify(data));
            showUser(data);
        }

        function showUser(user) {
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('userProfile').classList.remove('hidden');
            document.getElementById('userName').innerText = user.username;
            document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // 3. Simple Upload Handling
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const videoUrl = URL.createObjectURL(file);
            const user = JSON.parse(localStorage.getItem('user_data')) || { username: 'Guest' };
            
            const videoHTML = `
                <div class="h-screen w-full max-w-[450px] snap-start relative flex flex-col justify-center">
                    <video src="${videoUrl}" class="h-[85%] w-full object-cover rounded-xl" loop autoplay muted onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="absolute bottom-16 left-4 text-white p-4">
                        <p class="font-bold">@${user.username}</p>
                        <p class="text-sm">Fresh upload from my device!</p>
                    </div>
                </div>
            `;
            document.getElementById('feed').insertAdjacentHTML('afterbegin', videoHTML);
        }
    </script>
</body>
</html>
