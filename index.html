<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;background:#000;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden}
        #app{display:flex;flex-direction:column;height:100vh}
        #main{display:flex;flex:1;overflow:hidden}
        /* HEADER */
        #hdr{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#000;border-bottom:1px solid #1a1a1a;flex-shrink:0;z-index:50}
        /* SIDEBAR */
        #sidebar{width:72px;background:#000;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:4px;flex-shrink:0}
        @media(max-width:768px){#sidebar{display:none}}
        .nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .2s;width:62px;position:relative}
        .nb:hover{background:rgba(255,255,255,.07)}
        .nb i{font-size:20px;color:#666}
        .nb span{font-size:9px;color:#555;font-weight:600}
        .nb.active i,.nb.active span{color:#fff}
        .nbadge{position:absolute;top:6px;right:6px;background:#fe2c55;border-radius:50%;width:15px;height:15px;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700}
        /* PAGES */
        #content{flex:1;position:relative;overflow:hidden}
        .pg{position:absolute;inset:0;display:none;flex-direction:column;background:#000}
        .pg.on{display:flex}
        /* FEED */
        .feed-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
        .feed-scroll::-webkit-scrollbar{display:none}
        .vcard{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;justify-content:center;align-items:center;background:#000;flex-shrink:0;overflow:hidden}
        .vcard video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
        .vgrad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 50%);pointer-events:none}
        .vinfo{position:absolute;bottom:20px;left:14px;right:72px;z-index:10}
        .vacts{position:absolute;right:10px;bottom:20px;display:flex;flex-direction:column;gap:18px;align-items:center;z-index:10}
        .ab{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .15s}
        .ab:hover{transform:scale(1.12)}
        .ab i{font-size:28px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.7))}
        .ab span{font-size:11px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.9)}
        .liked{color:#fe2c55!important}
        @keyframes hpop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
        .hpop{animation:hpop .3s ease}
        .fpill{font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;font-weight:700;border:none;margin-left:4px}
        .fpill.off{background:#fe2c55;color:#fff}
        .fpill.on{background:#333;color:#aaa}
        /* COMMENT PANEL */
        .panel{position:fixed;bottom:0;left:0;right:0;background:#181818;border-radius:18px 18px 0 0;z-index:300;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:72vh}
        .panel.open{transform:translateY(0)}
        .ph{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
        .clist{flex:1;overflow-y:auto}
        .clist::-webkit-scrollbar{display:none}
        .crow{display:flex;gap:10px;padding:10px 14px}
        .crow img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
        .cinrow{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid #222;flex-shrink:0}
        .cinrow img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
        .cin{flex:1;background:#2a2a2a;border:none;outline:none;border-radius:20px;padding:8px 14px;color:#fff;font-size:14px}
        .cin::placeholder{color:#555}
        /* OVERLAY */
        #ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:250;display:none}
        #ov.on{display:block}
        /* MESSAGES */
        #convList{flex:1;overflow-y:auto}
        #convList::-webkit-scrollbar{display:none}
        .crow2{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #111}
        .crow2:hover{background:#141414}
        .crow2 img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0}
        /* CHAT */
        #chatView{position:absolute;inset:0;background:#0a0a0a;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s ease;z-index:20}
        #chatView.open{transform:translateX(0)}
        #chatHead{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
        #chatMsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:4px}
        #chatMsgs::-webkit-scrollbar{display:none}
        .bub{padding:9px 14px;border-radius:18px;max-width:75%;font-size:14px;line-height:1.4;word-break:break-word}
        .bub.me{background:#fe2c55;align-self:flex-end;border-bottom-right-radius:4px}
        .bub.them{background:#222;align-self:flex-start;border-bottom-left-radius:4px}
        #chatInRow{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid #1a1a1a;flex-shrink:0}
        #chatIn{flex:1;background:#1e1e1e;border:none;outline:none;border-radius:22px;padding:10px 16px;color:#fff;font-size:14px}
        #chatIn::placeholder{color:#444}
        /* NOTIFS */
        #notifList{flex:1;overflow-y:auto}
        .nrow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #111}
        .nrow img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
        .nrow.unread{background:#120a0e}
        /* PROFILE MODAL */
        #pmod{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center}
        #pmod.on{display:flex}
        #pmod .bd{position:absolute;inset:0;background:rgba(0,0,0,.75)}
        #pcard{position:relative;background:#181818;border:1px solid #2a2a2a;border-radius:20px;padding:24px 20px;width:290px;text-align:center;z-index:1}
        /* TOAST */
        #toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(25,25,25,.97);border:1px solid #333;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
        #toast.on{opacity:1}
        /* UPLOAD BAR */
        #upbar{height:2px;background:#1a1a1a;position:fixed;top:52px;left:0;right:0;z-index:999;display:none}
        #upfill{height:100%;background:#fe2c55;transition:width .3s;width:0}
        /* BUTTONS */
        .rbtn{background:#fe2c55;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-weight:700;font-size:13px;cursor:pointer}
        .rbtn:hover{opacity:.85}
        .gbtn{background:#252525;color:#ccc;border:none;border-radius:6px;padding:7px 18px;font-weight:700;font-size:13px;cursor:pointer}
        .gbtn:hover{background:#2e2e2e}
        .pg-title{padding:14px 16px;border-bottom:1px solid #1a1a1a;font-weight:700;font-size:16px;flex-shrink:0}
    </style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="hdr">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" style="height:22px;filter:brightness(0) invert(1)">
    <div id="upbar"><div id="upfill"></div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="document.getElementById('fi').click()" class="gbtn" style="padding:6px 14px;font-size:12px">+ Upload</button>
      <input type="file" id="fi" style="display:none" accept="video/*" onchange="handleUpload(event)">
      <button id="loginBtn" onclick="loginWithDiscord()" class="rbtn" style="padding:6px 14px;font-size:12px">Log in</button>
      <div id="ubar" style="display:none;align-items:center;gap:8px">
        <img id="uav" src="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid #333" onclick="openProfile(null)">
        <button onclick="logout()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer">Logout</button>
      </div>
    </div>
  </div>

  <div id="main">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="nb active" id="nb-feed" onclick="showPage('feed')"><i class="fas fa-home"></i><span>For You</span></div>
      <div class="nb" id="nb-following" onclick="showPage('following')"><i class="fas fa-user-friends"></i><span>Following</span></div>
      <div class="nb" id="nb-messages" onclick="showPage('messages')"><i class="fas fa-paper-plane"></i><span>Messages</span><div class="nbadge" id="mbadge"></div></div>
      <div class="nb" id="nb-notifs" onclick="showPage('notifs')"><i class="fas fa-bell"></i><span>Activity</span><div class="nbadge" id="nbadge"></div></div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <!-- FEED -->
      <div class="pg on" id="pg-feed">
        <div class="feed-scroll" id="feedScroll"></div>
      </div>
      <!-- FOLLOWING -->
      <div class="pg" id="pg-following">
        <div class="feed-scroll" id="followScroll"></div>
      </div>
      <!-- MESSAGES -->
      <div class="pg" id="pg-messages" style="position:relative">
        <div class="pg-title">Messages</div>
        <div id="convList"></div>
        <div id="chatView">
          <div id="chatHead">
            <button onclick="closeChat()" style="background:none;border:none;color:#666;font-size:18px;cursor:pointer"><i class="fas fa-arrow-left"></i></button>
            <img id="chatAv" src="" style="width:36px;height:36px;border-radius:50%;object-fit:cover">
            <span id="chatName" style="font-weight:700;font-size:15px"></span>
          </div>
          <div id="chatMsgs"></div>
          <div id="chatInRow">
            <input id="chatIn" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" class="rbtn" style="padding:9px 18px;border-radius:22px;flex-shrink:0">Send</button>
          </div>
        </div>
      </div>
      <!-- NOTIFICATIONS -->
      <div class="pg" id="pg-notifs">
        <div class="pg-title">Activity</div>
        <div id="notifList"></div>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="ov" onclick="closeAll()"></div>

<!-- COMMENT PANEL -->
<div class="panel" id="cPanel">
  <div style="width:40px;height:4px;background:#444;border-radius:2px;margin:10px auto 0;flex-shrink:0"></div>
  <div class="ph">
    <span style="font-weight:700;font-size:15px" id="cTitle">Comments</span>
    <button onclick="closeCmts()" style="background:none;border:none;color:#555;font-size:18px;cursor:pointer"><i class="fas fa-times"></i></button>
  </div>
  <div class="clist" id="clist"></div>
  <div class="cinrow">
    <img id="cav" src="" style="background:#222">
    <input class="cin" id="cin" placeholder="Add a comment..." maxlength="300" onkeydown="if(event.key==='Enter')postComment()">
    <button onclick="postComment()" style="background:none;border:none;color:#fe2c55;font-weight:700;font-size:13px;cursor:pointer;padding:0 4px">Post</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="pmod">
  <div class="bd" onclick="closeProfile()"></div>
  <div id="pcard">
    <button onclick="closeProfile()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#555;font-size:18px;cursor:pointer"><i class="fas fa-times"></i></button>
    <img id="pav" src="" style="width:76px;height:76px;border-radius:50%;object-fit:cover;border:2px solid #333;margin-bottom:10px">
    <div id="pname" style="font-weight:700;font-size:17px;margin-bottom:12px"></div>
    <div style="display:flex;justify-content:center;gap:32px;margin-bottom:16px">
      <div style="text-align:center"><div id="pfrs" style="font-weight:700;font-size:20px">0</div><div style="color:#666;font-size:11px">Followers</div></div>
      <div style="text-align:center"><div id="pfwg" style="font-weight:700;font-size:20px">0</div><div style="color:#666;font-size:11px">Following</div></div>
    </div>
    <div id="pacts" style="display:flex;justify-content:center;gap:8px"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL='https://riahwqxjgfxwskypnsxs.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYWh3cXhqZ2Z4d3NreXBuc3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY5OTgsImV4cCI6MjA4OTA3Mjk5OH0.rTgRS8G1LU7oKkvFicizAUxPCryFUIyPV1vSCHR88ZY';
const DISCORD_CLIENT='1484189679762014352';
const REDIRECT='https://ijscamengl.github.io/ijscamengl/';
const sb=supabase.createClient(SB_URL,SB_KEY);

let me=null, likes=new Set(), follows=new Set();
let cmtPostId=null, chatTarget=null, chatSub=null, ioObs=null;
let profileTarget=null, toastTmr=null, uploading=false;

// ══════════════════════════
// INIT
// ══════════════════════════
async function init(){
  // Handle Discord OAuth
  const hash=window.location.hash.slice(1);
  const params=new URLSearchParams(hash);
  const token=params.get('access_token');
  if(token){
    try{
      const r=await fetch('https://discord.com/api/users/@me',{headers:{Authorization:`Bearer ${token}`}});
      const u=await r.json();
      if(u&&u.id) localStorage.setItem('tik_u',JSON.stringify(u));
    }catch(e){}
    history.replaceState({},document.title,location.pathname);
  }

  const saved=localStorage.getItem('tik_u');
  if(saved){
    try{
      me=JSON.parse(saved);
      showUserUI();
      const [{data:lk},{data:fw}]=await Promise.all([
        sb.from('likes').select('post_id').eq('username',me.username),
        sb.from('follows').select('following').eq('follower',me.username)
      ]);
      (lk||[]).forEach(x=>likes.add(x.post_id));
      (fw||[]).forEach(x=>follows.add(x.following));
      subNotifs();
      subDMs();
      checkUnreadBadges();
    }catch(e){localStorage.removeItem('tik_u');me=null;}
  }
  loadFeed('feedScroll',false);
}

function showUserUI(){
  document.getElementById('loginBtn').style.display='none';
  document.getElementById('ubar').style.display='flex';
  document.getElementById('uav').src=avUrl(me);
  document.getElementById('cav').src=avUrl(me);
}

function avUrl(u){
  if(!u) return '';
  return u.avatar?`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png`
    :`https://ui-avatars.com/api/?name=${encodeURIComponent(u.username)}&background=222&color=fff`;
}

// ══════════════════════════
// PAGES
// ══════════════════════════
function showPage(p){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('on');
  document.getElementById('nb-'+p).classList.add('active');
  if(p==='feed') loadFeed('feedScroll',false);
  if(p==='following') loadFeed('followScroll',true);
  if(p==='messages') loadConvos();
  if(p==='notifs') loadNotifs();
}

// ══════════════════════════
// FEED
// ══════════════════════════
async function loadFeed(scrollId,followOnly){
  const el=document.getElementById(scrollId);
  el.innerHTML='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px">Loading...</div>';
  let q=sb.from('posts').select('*').order('created_at',{ascending:false});
  if(followOnly){
    const arr=Array.from(follows);
    if(!arr.length){el.innerHTML='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:13px;text-align:center;padding:20px">Follow people to see their videos!</div>';return;}
    q=q.in('username',arr);
  }
  const {data,error}=await q;
  if(error||!data||!data.length){el.innerHTML='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px">No videos yet!</div>';return;}
  el.innerHTML=data.map(buildCard).join('');
  setupAutoplay(el);
}

function buildCard(p){
  const liked=likes.has(p.id);
  const isF=follows.has(p.username);
  const isSelf=me&&me.username===p.username;
  const su=safeAttr(p.username), sa=safeAttr(p.avatar||'');
  return `<div class="vcard" data-id="${p.id}">
    <video src="${p.video_url}" loop muted playsinline preload="metadata"></video>
    <div class="vgrad"></div>
    <div class="vinfo">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <img src="${p.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${su}&background=222&color=fff'"
          style="width:34px;height:34px;border-radius:50%;border:2px solid #fff;object-fit:cover;cursor:pointer;flex-shrink:0"
          onclick="openProfile('${su}','${sa}')">
        <span style="font-weight:700;font-size:14px;cursor:pointer" onclick="openProfile('${su}','${sa}')">@${p.username}</span>
        ${!isSelf?`<button class="fpill ${isF?'on':'off'}" onclick="toggleFollow('${su}','${sa}',this)">${isF?'Following':'Follow'}</button>`:''}
      </div>
      <p style="font-size:12px;color:#bbb">#fyp #trending</p>
    </div>
    <div class="vacts">
      <div class="ab" onclick="toggleLike('${p.id}',this)">
        <i class="fas fa-heart ${liked?'liked':''}"></i><span id="lc-${p.id}">${p.likes||0}</span>
      </div>
      <div class="ab" onclick="openCmts('${p.id}')">
        <i class="fas fa-comment-dots"></i><span id="cc-${p.id}">${p.comment_count||0}</span>
      </div>
      <div class="ab" onclick="sharePost('${p.video_url}')">
        <i class="fas fa-share"></i><span>Share</span>
      </div>
      ${isSelf?`<div class="ab" onclick="deletePost('${p.id}')"><i class="fas fa-trash-alt" style="color:#f87171"></i><span style="color:#f87171;font-size:10px">Delete</span></div>`:''}
    </div>
  </div>`;
}

function setupAutoplay(container){
  if(ioObs) ioObs.disconnect();
  let cur=null;
  ioObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v=e.target.querySelector('video');
      if(!v) return;
      if(e.isIntersecting){
        if(cur&&cur!==v){cur.pause();cur.currentTime=0;}
        v.muted=true; v.play().catch(()=>{});
        cur=v;
      } else { v.pause(); }
    });
  },{threshold:0.8});
  container.querySelectorAll('.vcard').forEach(c=>ioObs.observe(c));
}

// ══════════════════════════
// LIKES
// ══════════════════════════
async function toggleLike(postId,btn){
  if(!me) return toast('Log in to like!');
  const heart=btn.querySelector('i');
  const el=document.getElementById('lc-'+postId);
  if(likes.has(postId)){
    likes.delete(postId); heart.classList.remove('liked');
    el.textContent=Math.max(0,parseInt(el.textContent)-1);
    await sb.from('likes').delete().eq('post_id',postId).eq('username',me.username);
    await sb.rpc('decrement_likes',{post_id:postId});
  } else {
    likes.add(postId); heart.classList.add('liked');
    heart.classList.add('hpop'); setTimeout(()=>heart.classList.remove('hpop'),350);
    el.textContent=parseInt(el.textContent)+1;
    await sb.from('likes').insert({post_id:postId,username:me.username});
    await sb.rpc('increment_likes',{post_id:postId});
    const {data:post}=await sb.from('posts').select('username').eq('id',postId).single();
    if(post&&post.username!==me.username) sendNotif(post.username,'like',`@${me.username} liked your video`);
  }
}

// ══════════════════════════
// COMMENTS
// ══════════════════════════
async function openCmts(postId){
  cmtPostId=postId;
  document.getElementById('cPanel').classList.add('open');
  document.getElementById('ov').classList.add('on');
  await loadCmts();
}
async function loadCmts(){
  const list=document.getElementById('clist');
  list.innerHTML='<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';
  const {data}=await sb.from('comments').select('*').eq('post_id',cmtPostId).order('created_at',{ascending:true});
  const cnt=data?data.length:0;
  document.getElementById('cTitle').textContent=cnt+' Comment'+(cnt!==1?'s':'');
  const cc=document.getElementById('cc-'+cmtPostId);
  if(cc) cc.textContent=cnt;
  if(!cnt){list.innerHTML='<div style="padding:30px;text-align:center;color:#444;font-size:13px">No comments yet. Be first!</div>';return;}
  list.innerHTML=data.map(c=>`<div class="crow">
    <img src="${c.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${safeAttr(c.username)}&background=222&color=fff'">
    <div><span style="font-weight:700;font-size:13px">${c.username}</span>
    <span style="color:#555;font-size:11px;margin-left:6px">${timeAgo(c.created_at)}</span>
    <p style="font-size:14px;color:#ddd;margin-top:2px;line-height:1.4">${escHtml(c.text)}</p></div>
  </div>`).join('');
  list.scrollTop=list.scrollHeight;
}
async function postComment(){
  if(!me) return toast('Log in to comment!');
  const input=document.getElementById('cin');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  await sb.from('comments').insert({post_id:cmtPostId,username:me.username,avatar:avUrl(me),text});
  const {data:post}=await sb.from('posts').select('username').eq('id',cmtPostId).single();
  if(post&&post.username!==me.username) sendNotif(post.username,'comment',`@${me.username} commented: "${text.slice(0,40)}"`);
  await loadCmts();
}
function closeCmts(){
  document.getElementById('cPanel').classList.remove('open');
  document.getElementById('ov').classList.remove('on');
}

// ══════════════════════════
// FOLLOW
// ══════════════════════════
async function toggleFollow(username,avatar,btn){
  if(!me) return toast('Log in to follow!');
  if(username===me.username) return;
  if(follows.has(username)){
    follows.delete(username); btn.textContent='Follow'; btn.className='fpill off';
    await sb.from('follows').delete().eq('follower',me.username).eq('following',username);
  } else {
    follows.add(username); btn.textContent='Following'; btn.className='fpill on';
    await sb.from('follows').insert({follower:me.username,following:username});
    toast('Following @'+username);
    sendNotif(username,'follow',`@${me.username} started following you`);
  }
}

// ══════════════════════════
// PROFILE
// ══════════════════════════
async function openProfile(username,avatar){
  if(!username&&me){username=me.username;avatar=avUrl(me);}
  if(!username) return;
  profileTarget={username,avatar};
  document.getElementById('pav').src=avatar||`https://ui-avatars.com/api/?name=${username}&background=222&color=fff`;
  document.getElementById('pname').textContent='@'+username;
  const [{count:frs},{count:fwg}]=await Promise.all([
    sb.from('follows').select('*',{count:'exact',head:true}).eq('following',username),
    sb.from('follows').select('*',{count:'exact',head:true}).eq('follower',username)
  ]);
  document.getElementById('pfrs').textContent=frs||0;
  document.getElementById('pfwg').textContent=fwg||0;
  const isSelf=me&&me.username===username;
  const isF=follows.has(username);
  const acts=document.getElementById('pacts');
  if(isSelf){
    acts.innerHTML='<span style="color:#555;font-size:13px">Your profile</span>';
  } else {
    acts.innerHTML=`
      <button id="pfBtn" onclick="profileFollow()" class="${isF?'gbtn':'rbtn'}">${isF?'Following':'Follow'}</button>
      <button onclick="profileMsg()" class="gbtn">Message</button>`;
  }
  document.getElementById('pmod').classList.add('on');
}
async function profileFollow(){
  if(!profileTarget) return;
  const dummy={textContent:'',className:''};
  await toggleFollow(profileTarget.username,profileTarget.avatar,dummy);
  const btn=document.getElementById('pfBtn');
  if(btn){
    const isNow=follows.has(profileTarget.username);
    btn.textContent=isNow?'Following':'Follow';
    btn.className=isNow?'gbtn':'rbtn';
  }
  const {count}=await sb.from('follows').select('*',{count:'exact',head:true}).eq('following',profileTarget.username);
  document.getElementById('pfrs').textContent=count||0;
}
function profileMsg(){
  closeProfile();
  showPage('messages');
  if(profileTarget) openChat(profileTarget.username,profileTarget.avatar);
}
function closeProfile(){document.getElementById('pmod').classList.remove('on');}

// ══════════════════════════
// MESSAGES
// ══════════════════════════
async function loadConvos(){
  const list=document.getElementById('convList');
  if(!me){list.innerHTML='<div style="padding:30px;text-align:center;color:#444;font-size:13px">Log in to message people</div>';return;}
  list.innerHTML='<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';

  // Get all people you've DMed or who've DMed you
  const {data:sent}=await sb.from('dms').select('to_user').eq('from_user',me.username);
  const {data:recv}=await sb.from('dms').select('from_user,from_avatar').eq('to_user',me.username);

  const partners=new Map();
  (sent||[]).forEach(m=>{ if(!partners.has(m.to_user)) partners.set(m.to_user,null); });
  (recv||[]).forEach(m=>{ if(!partners.has(m.from_user)) partners.set(m.from_user,m.from_avatar); });

  // Add people you follow so you can start a convo
  for(const u of follows){ if(!partners.has(u)) partners.set(u,null); }

  if(!partners.size){
    list.innerHTML='<div style="padding:30px;text-align:center;color:#444;font-size:13px;line-height:1.6">Follow people to start messaging them!</div>';
    return;
  }

  // Fill in missing avatars from posts table
  for(const [u,a] of partners){
    if(!a){
      const {data}=await sb.from('posts').select('avatar').eq('username',u).limit(1);
      partners.set(u, data&&data[0]?data[0].avatar:`https://ui-avatars.com/api/?name=${encodeURIComponent(u)}&background=222&color=fff`);
    }
  }

  // Check for unread messages
  const {data:unread}=await sb.from('dms').select('from_user').eq('to_user',me.username).eq('read_by_recipient',false);
  const unreadSet=new Set((unread||[]).map(x=>x.from_user));

  list.innerHTML=Array.from(partners.entries()).map(([u,a])=>`
    <div class="crow2" onclick="openChat('${safeAttr(u)}','${safeAttr(a||'')}')">
      <img src="${a}" onerror="this.src='https://ui-avatars.com/api/?name=${safeAttr(u)}&background=222&color=fff'">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px">@${u}</div>
        <div style="color:#555;font-size:12px;margin-top:2px">Tap to chat</div>
      </div>
      ${unreadSet.has(u)?'<div style="width:10px;height:10px;background:#fe2c55;border-radius:50%;flex-shrink:0"></div>':''}
    </div>`).join('');
}

async function openChat(username,avatar){
  chatTarget={username,avatar};
  document.getElementById('chatAv').src=avatar||`https://ui-avatars.com/api/?name=${username}&background=222&color=fff`;
  document.getElementById('chatName').textContent='@'+username;
  document.getElementById('chatView').classList.add('open');
  await loadMsgs();
  // Mark as read
  if(me) await sb.from('dms').update({read_by_recipient:true}).eq('to_user',me.username).eq('from_user',username);
  hideBadge('mbadge');
  // Subscribe to new messages via polling (most reliable approach)
  if(chatSub) clearInterval(chatSub);
  chatSub=setInterval(()=>pollNewMsgs(),3000);
}

let lastMsgId=null;
async function pollNewMsgs(){
  if(!me||!chatTarget) return;
  const {data}=await sb.from('dms').select('*')
    .or(`and(from_user.eq.${me.username},to_user.eq.${chatTarget.username}),and(from_user.eq.${chatTarget.username},to_user.eq.${me.username})`)
    .order('created_at',{ascending:false}).limit(1);
  if(!data||!data.length) return;
  const latest=data[0];
  if(latest.id!==lastMsgId){
    lastMsgId=latest.id;
    await loadMsgs();
    // Mark read
    await sb.from('dms').update({read_by_recipient:true}).eq('to_user',me.username).eq('from_user',chatTarget.username);
  }
}

async function loadMsgs(){
  const wrap=document.getElementById('chatMsgs');
  if(!me||!chatTarget) return;
  const {data}=await sb.from('dms').select('*')
    .or(`and(from_user.eq.${me.username},to_user.eq.${chatTarget.username}),and(from_user.eq.${chatTarget.username},to_user.eq.${me.username})`)
    .order('created_at',{ascending:true});
  wrap.innerHTML='';
  (data||[]).forEach(m=>{
    const mine=m.from_user===me.username;
    const el=document.createElement('div');
    el.className='bub '+(mine?'me':'them');
    el.textContent=m.text;
    wrap.appendChild(el);
  });
  wrap.scrollTop=wrap.scrollHeight;
  if(data&&data.length) lastMsgId=data[data.length-1].id;
}

async function sendMsg(){
  if(!me) return toast('Log in first!');
  if(!chatTarget) return;
  const input=document.getElementById('chatIn');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  const {error}=await sb.from('dms').insert({
    from_user:me.username,
    to_user:chatTarget.username,
    from_avatar:avUrl(me),
    text,
    read_by_recipient:false
  });
  if(error){ toast('Failed to send: '+error.message); return; }
  // Immediately show it
  const wrap=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='bub me';
  el.textContent=text;
  wrap.appendChild(el);
  wrap.scrollTop=wrap.scrollHeight;
  // Send notification
  sendNotif(chatTarget.username,'message',`@${me.username}: ${text.slice(0,50)}`);
}

function closeChat(){
  document.getElementById('chatView').classList.remove('open');
  if(chatSub){clearInterval(chatSub);chatSub=null;}
  chatTarget=null; lastMsgId=null;
}

// ══════════════════════════
// NOTIFICATIONS
// ══════════════════════════
async function loadNotifs(){
  const list=document.getElementById('notifList');
  if(!me){list.innerHTML='<div style="padding:30px;text-align:center;color:#444;font-size:13px">Log in to see notifications</div>';return;}
  list.innerHTML='<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';
  const {data}=await sb.from('notifications').select('*').eq('to_user',me.username).order('created_at',{ascending:false}).limit(50);
  if(!data||!data.length){list.innerHTML='<div style="padding:30px;text-align:center;color:#444;font-size:13px">No activity yet</div>';return;}
  list.innerHTML=data.map(n=>`
    <div class="nrow ${n.read?'':'unread'}">
      <img src="${n.from_avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${safeAttr(n.from_user)}&background=222&color=fff'">
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;line-height:1.4;color:${n.read?'#777':'#ddd'}">${escHtml(n.message)}</p>
        <span style="font-size:11px;color:#444">${timeAgo(n.created_at)}</span>
      </div>
      ${!n.read?'<div style="width:8px;height:8px;background:#fe2c55;border-radius:50%;flex-shrink:0"></div>':''}
    </div>`).join('');
  await sb.from('notifications').update({read:true}).eq('to_user',me.username).eq('read',false);
  hideBadge('nbadge');
}

async function sendNotif(toUser,type,message){
  try{
    await sb.from('notifications').insert({to_user:toUser,from_user:me.username,from_avatar:avUrl(me),type,message});
  }catch(e){}
}

function subNotifs(){
  if(!me) return;
  sb.channel('notif-'+me.username)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`to_user=eq.${me.username}`},p=>{
      toast('🔔 '+p.new.message);
      showBadge('nbadge');
    }).subscribe();
}

function subDMs(){
  if(!me) return;
  sb.channel('dm-in-'+me.username)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'dms',filter:`to_user=eq.${me.username}`},p=>{
      if(!chatTarget||chatTarget.username!==p.new.from_user) showBadge('mbadge');
    }).subscribe();
}

async function checkUnreadBadges(){
  const {count:unreadDMs}=await sb.from('dms').select('*',{count:'exact',head:true}).eq('to_user',me.username).eq('read_by_recipient',false);
  if(unreadDMs>0) showBadge('mbadge');
  const {count:unreadN}=await sb.from('notifications').select('*',{count:'exact',head:true}).eq('to_user',me.username).eq('read',false);
  if(unreadN>0) showBadge('nbadge');
}

function showBadge(id){const el=document.getElementById(id);if(el){el.style.display='flex';el.textContent='•';}}
function hideBadge(id){const el=document.getElementById(id);if(el) el.style.display='none';}

// ══════════════════════════
// UPLOAD
// ══════════════════════════
async function handleUpload(event){
  const file=event.target.files[0];
  if(!file) return;
  if(!me){event.target.value='';return toast('Log in to upload!');}
  if(uploading){event.target.value='';return toast('Please wait for current upload to finish');}
  uploading=true;
  const bar=document.getElementById('upbar'), fill=document.getElementById('upfill');
  bar.style.display='block'; fill.style.width='15%';
  const name=Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  try{
    const {error:upErr}=await sb.storage.from('videos').upload(name,file);
    if(upErr) throw upErr;
    fill.style.width='70%';
    const {data:{publicUrl}}=sb.storage.from('videos').getPublicUrl(name);
    const {error:dbErr}=await sb.from('posts').insert([{video_url:publicUrl,username:me.username,avatar:avUrl(me),likes:0,comment_count:0}]);
    if(dbErr) throw dbErr;
    fill.style.width='100%';
    toast('Uploaded!');
    setTimeout(()=>location.reload(),700);
  }catch(e){
    alert('Upload failed: '+e.message);
    bar.style.display='none';
    uploading=false;
  }
  event.target.value='';
}

async function deletePost(id){
  if(!confirm('Delete this video?')) return;
  await sb.from('posts').delete().eq('id',id);
  location.reload();
}

function sharePost(url){
  navigator.clipboard.writeText(url).then(()=>toast('Link copied!')).catch(()=>toast('Copy failed'));
}

// ══════════════════════════
// UTILS
// ══════════════════════════
function closeAll(){closeCmts();}
function loginWithDiscord(){
  location.href=`https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
}
function logout(){localStorage.removeItem('tik_u');location.reload();}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('on'),2800);
}

function safeAttr(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(d){
  const s=(Date.now()-new Date(d))/1000;
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

init();
</script>
