<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlassOS Black</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #0A84FF;
            --system-gray: #1C1C1E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            height: 100vh;
            background-color: #000; /* Pure Black Background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Main iPhone-style Container */
        .container {
            width: 375px;
            height: 812px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 44px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* The Tab Box at the Top (Dynamic Island style) */
        .tab-box {
            width: 220px;
            height: 38px;
            background: #1c1c1e;
            margin: 15px auto;
            border-radius: 20px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            border: 0.5px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .tab {
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
            padding: 5px 10px;
        }

        .tab.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        /* Content Sections */
        .view {
            flex: 1;
            padding: 25px;
            display: none;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        .view.active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Webhook & Chat UI Elements */
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #1c1c1e;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:active { opacity: 0.7; }

        #chat-log {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            overflow-y: auto;
            font-size: 13px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #32d74b;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-box">
        <div class="tab active" onclick="nav('chat')">Chat</div>
        <div class="tab" onclick="nav('hook')">Webhook</div>
        <div class="tab" onclick="nav('info')">Info</div>
    </div>

    <div id="chat" class="view active">
        <h2>Messages</h2>
        <div id="chat-log">
            <div style="color: #8e8e93; margin-bottom: 10px;">
                <span class="status-dot"></span> System: Local session started.
            </div>
        </div>
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button class="action-btn" onclick="sendMsg()">Send Message</button>
    </div>

    <div id="hook" class="view">
        <h2>Webhook Tool</h2>
        <div class="glass-card">
            <label style="font-size: 12px; color: #8e8e93;">Target URL</label>
            <input type="text" id="target-url" placeholder="https://discord.com/api/webhooks/...">
            
            <label style="font-size: 12px; color: #8e8e93;">Action Type</label>
            <select id="action-type">
                <option value="scam">Scam Warning</option>
                <option value="test">Connectivity Test</option>
            </select>
            
            <button class="action-btn" onclick="runHook()" style="background: #32d74b;">Connect & Execute</button>
        </div>
        <p style="font-size: 11px; color: #ff453a; text-align: center;">
            Warning: This tool is strictly for authorized testing.
        </p>
    </div>

    <div id="info" class="view">
        <h2>Information</h2>
        <div class="glass-card">
            <p><strong>Status:</strong> Online</p>
            <p><strong>Environment:</strong> GitHub Static</p>
            <p style="font-size: 12px; margin-top: 20px;">
                This interface is designed to combat malicious webhooks by sending automated warnings to scammers.
            </p>
        </div>
        <button class="action-btn" onclick="location.reload()" style="background: #1c1c1e;">Restart System</button>
    </div>
</div>

<script>
    // Tab Navigation logic
    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Local Chat function
    function sendMsg() {
        const input = document.getElementById('msg-input');
        const log = document.getElementById('chat-log');
        if(!input.value.trim()) return;

        const entry = document.createElement('div');
        entry.style.marginBottom = "8px";
        entry.innerHTML = `<span style="color:var(--accent)">You:</span> ${input.value}`;
        log.appendChild(entry);
        
        input.value = "";
        log.scrollTop = log.scrollHeight;
    }

    // Webhook Execution
    async function runHook() {
        const url = document.getElementById('target-url').value;
        const type = document.getElementById('action-type').value;

        if(!url.startsWith('http')) {
            alert("Please enter a valid URL.");
            return;
        }

        const msg = type === 'scam' 
            ? "⚠️ ALERT: This webhook has been flagged for scamming activity." 
            : "Connection Test: Webhook active.";

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: msg })
            });

            if(response.ok) alert("Command Sent Successfully!");
            else alert("Error: Webhook rejected the request.");
        } catch(e) {
            alert("Network Error: Ensure the URL is correct and allows browser requests.");
        }
    }
</script>

</body>
</html>
