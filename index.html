<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Notifier | Dashboard updated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0f] text-zinc-100 min-h-screen flex flex-col items-center p-6 font-sans">
    <div class="w-full max-w-xl">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black tracking-tighter">HOOK <span class="text-blue-500">NOTIFIER</span></h1>
            <button id="authBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-bold transition">Login with Discord</button>
        </header>

        <div id="dashboard" class="hidden space-y-6">
            <div class="bg-[#16161a] border border-zinc-800 p-8 rounded-2xl shadow-2xl">
                <h2 class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">Cloud Configuration</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-2 font-semibold">Header Message</label>
                        <input type="text" id="testMsg" value="Cloud Active!" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition">
                    </div>

                    <div class="flex items-center justify-between p-4 bg-black/50 border border-zinc-800 rounded-xl">
                        <span class="text-sm font-medium">Auto-Joiner Toggle</span>
                        <input type="checkbox" id="ajToggle" class="w-5 h-5 accent-blue-500">
                    </div>

                    <button id="saveBtn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-zinc-200 transition uppercase text-sm tracking-widest">Sync to Roblox</button>
                    <p id="status" class="text-center text-xs font-bold text-blue-400 min-h-[1em]"></p>
                </div>
            </div>
            
            <div class="text-center space-y-2">
                <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Your Roblox Sync ID:</p>
                <code id="userKeyDisplay" class="bg-black px-3 py-1 rounded border border-zinc-800 text-blue-400 text-xs font-mono">Loading ID...</code>
            </div>
        </div>

        <div id="loginPrompt" class="text-center py-20">
            <p class="text-zinc-500 font-medium">Please login to access your dashboard.</p>
        </div>
    </div>

    <script>
        const SB_URL = "https://riahwqxjgfxwskypnsxs.supabase.co";
        const SB_KEY = "sb_publishable_7pGP3l7rkLG31QEg6WC_2w_END7EKMt";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const authBtn = document.getElementById('authBtn');
        const dashboard = document.getElementById('dashboard');
        const loginPrompt = document.getElementById('loginPrompt');
        const userKeyDisplay = document.getElementById('userKeyDisplay');
        const status = document.getElementById('status');

        authBtn.onclick = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                await supabaseClient.auth.signOut();
                location.reload();
            } else {
                await supabaseClient.auth.signInWithOAuth({ 
                    provider: 'discord',
                    options: { redirectTo: "https://ijscamengl.github.io/" }
                });
            }
        };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                authBtn.innerText = "Logout";
                dashboard.classList.remove('hidden');
                loginPrompt.classList.add('hidden');
                userKeyDisplay.innerText = user.id;
                
                // Fetch existing data
                let { data } = await supabaseClient.from('configs').select('*').eq('id', user.id).single();
                if (data) {
                    document.getElementById('testMsg').value = data.message || "";
                    document.getElementById('ajToggle').checked = data.enabled || false;
                }
            }
        }

        document.getElementById('saveBtn').onclick = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return alert("Please login first!");

            status.innerText = "SYNCING...";
            
            const { error } = await supabaseClient.from('configs').upsert({
                id: user.id,
                message: document.getElementById('testMsg').value,
                enabled: document.getElementById('ajToggle').checked,
                threshold: 500000000, // default
                expiry: 60 // default
            });

            if (error) {
                status.innerText = "ERROR: " + error.message;
                console.error(error);
            } else {
                status.innerText = "✅ SYNCED TO CLOUD!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }
        };

        init();
    </script>
</body>
</html>
