<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* ── LAYOUT ── */
        #app { display: flex; flex-direction: column; height: 100vh; }
        #main { display: flex; flex: 1; overflow: hidden; }

        /* ── HEADER ── */
        #header { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: #000; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; z-index: 50; }

        /* ── SIDEBAR ── */
        #sidebar { width: 72px; background: #000; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 4px; flex-shrink: 0; }
        @media(max-width:768px){ #sidebar { display: none; } }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background .2s; width: 64px; }
        .nav-btn:hover { background: rgba(255,255,255,.07); }
        .nav-btn i { font-size: 20px; color: #666; }
        .nav-btn span { font-size: 9px; color: #555; font-weight: 600; }
        .nav-btn.active i { color: #fff; }
        .nav-btn.active span { color: #fff; }
        .nav-btn .badge { position: absolute; top: -3px; right: -3px; background: #fe2c55; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* ── PAGES ── */
        #content { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; }
        .page.active { display: flex; }

        /* ── FEED ── */
        #feedScroll { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feedScroll::-webkit-scrollbar { display: none; }
        .video-card { height: 100%; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; justify-content: center; align-items: center; background: #000; flex-shrink: 0; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 50%); pointer-events: none; }
        .video-info { position: absolute; bottom: 20px; left: 14px; right: 72px; z-index: 10; }
        .video-actions { position: absolute; right: 10px; bottom: 20px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 10; }
        .act-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; transition: transform .15s; }
        .act-btn:hover { transform: scale(1.12); }
        .act-btn i { font-size: 28px; filter: drop-shadow(0 1px 4px rgba(0,0,0,.7)); }
        .act-btn span { font-size: 11px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.9); }
        .liked { color: #fe2c55 !important; }
        @keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }
        .heart-pop { animation: heartPop .3s ease; }
        .follow-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: 700; border: none; margin-left: 4px; }
        .follow-pill.off { background: #fe2c55; color: #fff; }
        .follow-pill.on  { background: #333; color: #aaa; }

        /* ── COMMENT PANEL ── */
        .panel { position: fixed; bottom: 0; left: 0; right: 0; background: #181818; border-radius: 18px 18px 0 0; z-index: 300; transform: translateY(100%); transition: transform .32s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; max-height: 72vh; }
        .panel.open { transform: translateY(0); }
        .panel-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 10px auto 0; }
        .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 8px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
        .comment-list { flex: 1; overflow-y: auto; }
        .comment-list::-webkit-scrollbar { display: none; }
        .comment-row { display: flex; gap: 10px; padding: 10px 14px; }
        .comment-row img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .comment-input-row { display: flex; gap: 8px; align-items: center; padding: 10px 12px; border-top: 1px solid #222; flex-shrink: 0; }
        .comment-input-row img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .c-input { flex: 1; background: #2a2a2a; border: none; outline: none; border-radius: 20px; padding: 8px 14px; color: #fff; font-size: 14px; }
        .c-input::placeholder { color: #555; }

        /* ── OVERLAY ── */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 250; display: none; }
        #overlay.on { display: block; }

        /* ── MESSAGES PAGE ── */
        #msgPage { background: #0a0a0a; }
        #convList { flex: 1; overflow-y: auto; }
        #convList::-webkit-scrollbar { display: none; }
        .conv-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background .15s; border-bottom: 1px solid #111; }
        .conv-row:hover { background: #141414; }
        .conv-row img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .unread-dot { width: 10px; height: 10px; background: #fe2c55; border-radius: 50%; flex-shrink: 0; }

        /* ── CHAT VIEW ── */
        #chatView { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s ease; z-index: 10; }
        #chatView.open { transform: translateX(0); }
        #chatHead { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        #chatMessages::-webkit-scrollbar { display: none; }
        .msg-bubble { padding: 9px 14px; border-radius: 18px; max-width: 75%; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-mine { background: #fe2c55; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #222; align-self: flex-start; border-bottom-left-radius: 4px; }
        #chatInputRow { display: flex; gap: 8px; align-items: center; padding: 10px 12px; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
        #chatInput { flex: 1; background: #1e1e1e; border: none; outline: none; border-radius: 22px; padding: 10px 16px; color: #fff; font-size: 14px; }
        #chatInput::placeholder { color: #444; }

        /* ── NOTIFICATIONS ── */
        #notifPage { background: #0a0a0a; }
        #notifList { flex: 1; overflow-y: auto; }
        .notif-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid #111; }
        .notif-row img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .notif-row.unread { background: #120a0e; }

        /* ── PROFILE MODAL ── */
        #profileModal { position: fixed; inset: 0; z-index: 600; display: none; align-items: center; justify-content: center; }
        #profileModal.on { display: flex; }
        #profileModal .backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.75); }
        #profileCard { position: relative; background: #181818; border: 1px solid #2a2a2a; border-radius: 20px; padding: 24px 20px; width: 290px; text-align: center; z-index: 1; }

        /* ── TOAST ── */
        #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,.97); border: 1px solid #333; padding: 8px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
        #toast.on { opacity: 1; }

        /* ── UPLOAD PROGRESS ── */
        #uploadBar { height: 2px; background: #1a1a1a; position: fixed; top: 52px; left: 0; right: 0; z-index: 999; display: none; }
        #uploadFill { height: 100%; background: #fe2c55; transition: width .3s; width: 0; }

        /* ── MISC ── */
        .red-btn { background: #fe2c55; color: #fff; border: none; border-radius: 6px; padding: 7px 18px; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .2s; }
        .red-btn:hover { opacity: .85; }
        .grey-btn { background: #252525; color: #ccc; border: none; border-radius: 6px; padding: 7px 18px; font-weight: 700; font-size: 13px; cursor: pointer; transition: background .2s; }
        .grey-btn:hover { background: #2e2e2e; }
    </style>
</head>
<body>
<div id="app">

    <!-- HEADER -->
    <div id="header">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" style="height:22px;filter:brightness(0) invert(1)">
        <div id="uploadBar"><div id="uploadFill"></div></div>
        <div style="display:flex;align-items:center;gap:10px">
            <button onclick="document.getElementById('fileInput').click()" class="grey-btn" style="padding:6px 14px;font-size:12px">+ Upload</button>
            <input type="file" id="fileInput" style="display:none" accept="video/*" onchange="handleUpload(event)">
            <button id="loginBtn" onclick="loginWithDiscord()" class="red-btn" style="padding:6px 14px;font-size:12px">Log in</button>
            <div id="userBar" style="display:none;align-items:center;gap:8px">
                <img id="userAvatar" src="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid #333" onclick="openProfile(null)">
                <button onclick="logout()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer">Logout</button>
            </div>
        </div>
    </div>

    <div id="main">
        <!-- SIDEBAR -->
        <div id="sidebar">
            <div class="nav-btn active" id="nb-feed" onclick="showPage('feed')">
                <i class="fas fa-home"></i><span>For You</span>
            </div>
            <div class="nav-btn" id="nb-following" onclick="showPage('following')">
                <i class="fas fa-user-friends"></i><span>Following</span>
            </div>
            <div class="nav-btn" id="nb-messages" onclick="showPage('messages')" style="position:relative">
                <i class="fas fa-paper-plane"></i><span>Messages</span>
                <div class="badge" id="msgBadge" style="display:none">!</div>
            </div>
            <div class="nav-btn" id="nb-notifs" onclick="showPage('notifs')" style="position:relative">
                <i class="fas fa-bell"></i><span>Activity</span>
                <div class="badge" id="notifBadge" style="display:none">!</div>
            </div>
        </div>

        <!-- CONTENT AREA -->
        <div id="content">

            <!-- FEED PAGE -->
            <div class="page active" id="page-feed">
                <div id="feedScroll"></div>
            </div>

            <!-- FOLLOWING PAGE -->
            <div class="page" id="page-following">
                <div id="followingScroll" style="height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none"></div>
            </div>

            <!-- MESSAGES PAGE -->
            <div class="page" id="page-messages" style="position:relative">
                <div style="padding:14px 16px;border-bottom:1px solid #1a1a1a;font-weight:700;font-size:16px;flex-shrink:0">Messages</div>
                <div id="convList"></div>
                <!-- CHAT VIEW (slides in) -->
                <div id="chatView">
                    <div id="chatHead">
                        <button onclick="closeChat()" style="background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:4px"><i class="fas fa-arrow-left"></i></button>
                        <img id="chatAvatar" src="" style="width:36px;height:36px;border-radius:50%;object-fit:cover">
                        <span id="chatName" style="font-weight:700;font-size:15px"></span>
                    </div>
                    <div id="chatMessages"></div>
                    <div id="chatInputRow">
                        <input id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMsg()">
                        <button onclick="sendMsg()" class="red-btn" style="padding:8px 16px;border-radius:20px">Send</button>
                    </div>
                </div>
            </div>

            <!-- NOTIFICATIONS PAGE -->
            <div class="page" id="page-notifs">
                <div style="padding:14px 16px;border-bottom:1px solid #1a1a1a;font-weight:700;font-size:16px;flex-shrink:0">Activity</div>
                <div id="notifList"></div>
            </div>

        </div><!-- /content -->
    </div><!-- /main -->
</div><!-- /app -->

<!-- OVERLAY -->
<div id="overlay" onclick="closeAll()"></div>

<!-- COMMENT PANEL -->
<div class="panel" id="commentPanel">
    <div class="panel-handle"></div>
    <div class="panel-head">
        <span style="font-weight:700;font-size:15px" id="cPanelTitle">Comments</span>
        <button onclick="closeComments()" style="background:none;border:none;color:#555;font-size:18px;cursor:pointer"><i class="fas fa-times"></i></button>
    </div>
    <div class="comment-list" id="commentList"></div>
    <div class="comment-input-row">
        <img id="cAvatar" src="" style="background:#222">
        <input class="c-input" id="cInput" placeholder="Add a comment..." maxlength="300" onkeydown="if(event.key==='Enter')postComment()">
        <button onclick="postComment()" style="background:none;border:none;color:#fe2c55;font-weight:700;font-size:13px;cursor:pointer;padding:0 4px">Post</button>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
    <div class="backdrop" onclick="closeProfile()"></div>
    <div id="profileCard">
        <button onclick="closeProfile()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#555;font-size:18px;cursor:pointer"><i class="fas fa-times"></i></button>
        <img id="pAvatar" src="" style="width:76px;height:76px;border-radius:50%;object-fit:cover;border:2px solid #333;margin-bottom:10px">
        <div id="pName" style="font-weight:700;font-size:17px;margin-bottom:12px"></div>
        <div style="display:flex;justify-content:center;gap:32px;margin-bottom:16px">
            <div style="text-align:center"><div id="pFollowers" style="font-weight:700;font-size:20px">0</div><div style="color:#666;font-size:11px">Followers</div></div>
            <div style="text-align:center"><div id="pFollowing" style="font-weight:700;font-size:20px">0</div><div style="color:#666;font-size:11px">Following</div></div>
        </div>
        <div id="pActions" style="display:flex;justify-content:center;gap:8px"></div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SB_URL = 'https://riahwqxjgfxwskypnsxs.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYWh3cXhqZ2Z4d3NreXBuc3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY5OTgsImV4cCI6MjA4OTA3Mjk5OH0.rTgRS8G1LU7oKkvFicizAUxPCryFUIyPV1vSCHR88ZY';
const CLIENT_ID = '1484189679762014352';
const REDIRECT = 'https://ijscamengl.github.io/ijscamengl/';
const sb = supabase.createClient(SB_URL, SB_KEY);

let me = null;
let likes = new Set(), follows = new Set();
let activePage = 'feed';
let commentPostId = null;
let chatTarget = null;
let chatChannel = null;
let ioObs = null;
let profileTarget = null;
let toastTmr = null;
let notifChannel = null;
let dmChannel2 = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
    const hash = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    if (token) {
        try {
            const r = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
            const u = await r.json();
            if (u && u.id) localStorage.setItem('tik_u', JSON.stringify(u));
        } catch(e){}
        history.replaceState({}, '', location.pathname);
    }

    const saved = localStorage.getItem('tik_u');
    if (saved) {
        try {
            me = JSON.parse(saved);
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userBar').style.display = 'flex';
            document.getElementById('userAvatar').src = av(me);
            document.getElementById('cAvatar').src = av(me);
            const [{ data: lk }, { data: fw }] = await Promise.all([
                sb.from('likes').select('post_id').eq('username', me.username),
                sb.from('follows').select('following').eq('follower', me.username)
            ]);
            (lk || []).forEach(x => likes.add(x.post_id));
            (fw || []).forEach(x => follows.add(x.following));
            subscribeNotifs();
            subscribeDMs();
        } catch(e){ localStorage.removeItem('tik_u'); me = null; }
    }

    loadFeed('feedScroll', false);
}

function av(u) {
    if (!u) return '';
    return u.avatar ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png`
                    : `https://ui-avatars.com/api/?name=${u.username}&background=222&color=fff`;
}

// ═══════════════════════════════════════════
// PAGES
// ═══════════════════════════════════════════
function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.getElementById('nb-' + p).classList.add('active');
    activePage = p;
    if (p === 'feed') loadFeed('feedScroll', false);
    if (p === 'following') loadFeed('followingScroll', true);
    if (p === 'messages') loadConversations();
    if (p === 'notifs') loadNotifs();
}

// ═══════════════════════════════════════════
// FEED
// ═══════════════════════════════════════════
async function loadFeed(scrollId, followingOnly) {
    const container = document.getElementById(scrollId);
    container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px">Loading...</div>';

    let query = sb.from('posts').select('*').order('created_at', { ascending: false });
    if (followingOnly) {
        const arr = Array.from(follows);
        if (!arr.length) {
            container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px;text-align:center;padding:20px">Follow people to see their videos here!</div>';
            return;
        }
        query = query.in('username', arr);
    }

    const { data, error } = await query;
    if (error || !data || !data.length) {
        container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px">No videos yet!</div>';
        return;
    }

    container.innerHTML = data.map(post => buildCard(post)).join('');
    setupAutoplay(container);
}

function buildCard(post) {
    const liked = likes.has(post.id);
    const isFollowing = follows.has(post.username);
    const isSelf = me && me.username === post.username;
    const isOwner = isSelf;
    const su = esc(post.username), sa = esc(post.avatar || '');
    return `
    <div class="video-card" data-id="${post.id}" style="height:100%">
        <video src="${post.video_url}" loop muted playsinline preload="metadata" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></video>
        <div class="video-overlay"></div>
        <div class="video-info">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
                <img src="${post.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${su}&background=222&color=fff'"
                    style="width:34px;height:34px;border-radius:50%;border:2px solid #fff;object-fit:cover;cursor:pointer;flex-shrink:0"
                    onclick="openProfile('${su}','${sa}')">
                <span style="font-weight:700;font-size:14px;cursor:pointer" onclick="openProfile('${su}','${sa}')">@${post.username}</span>
                ${!isSelf ? `<button class="follow-pill ${isFollowing?'on':'off'}" onclick="toggleFollow('${su}','${sa}',this)">${isFollowing?'Following':'Follow'}</button>` : ''}
            </div>
            <p style="font-size:12px;color:#ccc">#fyp #trending</p>
        </div>
        <div class="video-actions">
            <div class="act-btn" onclick="toggleLike('${post.id}',this)">
                <i class="fas fa-heart ${liked?'liked':''}"></i>
                <span id="lc-${post.id}">${post.likes||0}</span>
            </div>
            <div class="act-btn" onclick="openComments('${post.id}')">
                <i class="fas fa-comment-dots"></i>
                <span id="cc-${post.id}">${post.comment_count||0}</span>
            </div>
            <div class="act-btn" onclick="sharePost('${post.video_url}')">
                <i class="fas fa-share"></i>
                <span>Share</span>
            </div>
            ${isOwner ? `<div class="act-btn" onclick="deletePost('${post.id}')"><i class="fas fa-trash-alt" style="color:#f87171"></i><span style="color:#f87171;font-size:10px">Delete</span></div>` : ''}
        </div>
    </div>`;
}

function setupAutoplay(container) {
    if (ioObs) ioObs.disconnect();
    let cur = null;
    ioObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            const v = e.target.querySelector('video');
            if (!v) return;
            if (e.isIntersecting) {
                if (cur && cur !== v) { cur.pause(); cur.currentTime = 0; }
                v.muted = true; v.play().catch(()=>{});
                cur = v;
            } else { v.pause(); }
        });
    }, { threshold: 0.8 });
    container.querySelectorAll('.video-card').forEach(c => ioObs.observe(c));
}

// ═══════════════════════════════════════════
// LIKES
// ═══════════════════════════════════════════
async function toggleLike(postId, btn) {
    if (!me) return toast('Log in to like!');
    const heart = btn.querySelector('i');
    const el = document.getElementById('lc-' + postId);
    if (likes.has(postId)) {
        likes.delete(postId); heart.classList.remove('liked');
        el.textContent = Math.max(0, parseInt(el.textContent) - 1);
        await sb.from('likes').delete().eq('post_id', postId).eq('username', me.username);
        await sb.rpc('decrement_likes', { post_id: postId });
    } else {
        likes.add(postId); heart.classList.add('liked');
        heart.classList.add('heart-pop'); setTimeout(() => heart.classList.remove('heart-pop'), 350);
        el.textContent = parseInt(el.textContent) + 1;
        await sb.from('likes').insert({ post_id: postId, username: me.username });
        await sb.rpc('increment_likes', { post_id: postId });
        // Notify post owner
        const { data: post } = await sb.from('posts').select('username').eq('id', postId).single();
        if (post && post.username !== me.username) {
            await sb.from('notifications').insert({ to_user: post.username, from_user: me.username, from_avatar: av(me), type: 'like', message: `@${me.username} liked your video` });
        }
    }
}

// ═══════════════════════════════════════════
// COMMENTS
// ═══════════════════════════════════════════
async function openComments(postId) {
    commentPostId = postId;
    document.getElementById('commentPanel').classList.add('open');
    document.getElementById('overlay').classList.add('on');
    await loadComments();
}

async function loadComments() {
    const list = document.getElementById('commentList');
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';
    const { data } = await sb.from('comments').select('*').eq('post_id', commentPostId).order('created_at', { ascending: true });
    const cnt = data ? data.length : 0;
    document.getElementById('cPanelTitle').textContent = cnt + ' Comment' + (cnt !== 1 ? 's' : '');
    const ccEl = document.getElementById('cc-' + commentPostId);
    if (ccEl) ccEl.textContent = cnt;
    if (!cnt) { list.innerHTML = '<div style="padding:30px;text-align:center;color:#444;font-size:13px">No comments yet. Be the first!</div>'; return; }
    list.innerHTML = data.map(c => `
        <div class="comment-row">
            <img src="${c.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${esc(c.username)}&background=222&color=fff'">
            <div>
                <span style="font-weight:700;font-size:13px">${c.username}</span>
                <span style="color:#777;font-size:11px;margin-left:6px">${timeAgo(c.created_at)}</span>
                <p style="font-size:14px;color:#ddd;margin-top:2px;line-height:1.4">${escHtml(c.text)}</p>
            </div>
        </div>`).join('');
    list.scrollTop = list.scrollHeight;
}

async function postComment() {
    if (!me) return toast('Log in to comment!');
    const input = document.getElementById('cInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await sb.from('comments').insert({ post_id: commentPostId, username: me.username, avatar: av(me), text });
    // Notify post owner
    const { data: post } = await sb.from('posts').select('username').eq('id', commentPostId).single();
    if (post && post.username !== me.username) {
        await sb.from('notifications').insert({ to_user: post.username, from_user: me.username, from_avatar: av(me), type: 'comment', message: `@${me.username} commented: "${text.slice(0,40)}"` });
    }
    await loadComments();
}

function closeComments() {
    document.getElementById('commentPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('on');
}

// ═══════════════════════════════════════════
// FOLLOW
// ═══════════════════════════════════════════
async function toggleFollow(username, avatar, btn) {
    if (!me) return toast('Log in to follow!');
    if (username === me.username) return;
    if (follows.has(username)) {
        follows.delete(username); btn.textContent = 'Follow'; btn.className = 'follow-pill off';
        await sb.from('follows').delete().eq('follower', me.username).eq('following', username);
    } else {
        follows.add(username); btn.textContent = 'Following'; btn.className = 'follow-pill on';
        await sb.from('follows').insert({ follower: me.username, following: username });
        toast('Following @' + username);
        await sb.from('notifications').insert({ to_user: username, from_user: me.username, from_avatar: av(me), type: 'follow', message: `@${me.username} started following you` });
    }
}

// ═══════════════════════════════════════════
// PROFILE MODAL
// ═══════════════════════════════════════════
async function openProfile(username, avatar) {
    if (!username && me) { username = me.username; avatar = av(me); }
    if (!username) return;
    profileTarget = { username, avatar };
    document.getElementById('pAvatar').src = avatar || `https://ui-avatars.com/api/?name=${username}&background=222&color=fff`;
    document.getElementById('pName').textContent = '@' + username;
    const [{ count: frs }, { count: fwg }] = await Promise.all([
        sb.from('follows').select('*', { count: 'exact', head: true }).eq('following', username),
        sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower', username)
    ]);
    document.getElementById('pFollowers').textContent = frs || 0;
    document.getElementById('pFollowing').textContent = fwg || 0;
    const isSelf = me && me.username === username;
    const isFollowing = follows.has(username);
    const actions = document.getElementById('pActions');
    if (isSelf) {
        actions.innerHTML = '<span style="color:#555;font-size:13px">Your profile</span>';
    } else {
        actions.innerHTML = `
            <button id="pFollowBtn" onclick="profileToggleFollow()" class="${isFollowing ? 'grey-btn' : 'red-btn'}">${isFollowing ? 'Following' : 'Follow'}</button>
            <button onclick="profileMessage()" class="grey-btn">Message</button>`;
    }
    document.getElementById('profileModal').classList.add('on');
}

async function profileToggleFollow() {
    if (!profileTarget) return;
    const dummy = document.createElement('button');
    await toggleFollow(profileTarget.username, profileTarget.avatar, dummy);
    const btn = document.getElementById('pFollowBtn');
    if (btn) {
        const isNow = follows.has(profileTarget.username);
        btn.textContent = isNow ? 'Following' : 'Follow';
        btn.className = isNow ? 'grey-btn' : 'red-btn';
    }
    const { count } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following', profileTarget.username);
    document.getElementById('pFollowers').textContent = count || 0;
}

function profileMessage() {
    closeProfile();
    showPage('messages');
    if (profileTarget) openChat(profileTarget.username, profileTarget.avatar);
}

function closeProfile() { document.getElementById('profileModal').classList.remove('on'); }

// ═══════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════
async function loadConversations() {
    const list = document.getElementById('convList');
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';
    if (!me) { list.innerHTML = '<div style="padding:30px;text-align:center;color:#444;font-size:13px">Log in to message people</div>'; return; }

    const { data: sent } = await sb.from('dms').select('to_user').eq('from_user', me.username);
    const { data: recv } = await sb.from('dms').select('from_user, from_avatar').eq('to_user', me.username);
    const partners = new Map();
    (sent || []).forEach(m => partners.set(m.to_user, null));
    (recv || []).forEach(m => { if (!partners.has(m.from_user)) partners.set(m.from_user, m.from_avatar); });

    // Also add followed users so you can start a new chat
    for (const u of follows) {
        if (!partners.has(u)) partners.set(u, null);
    }

    // Fill in missing avatars
    for (const [u, a] of partners) {
        if (!a) {
            const { data } = await sb.from('posts').select('avatar').eq('username', u).limit(1);
            partners.set(u, data && data[0] ? data[0].avatar : `https://ui-avatars.com/api/?name=${u}&background=222&color=fff`);
        }
    }

    if (!partners.size) {
        list.innerHTML = '<div style="padding:30px;text-align:center;color:#444;font-size:13px;line-height:1.6">Follow people to start messaging them!</div>';
        return;
    }

    // Check for unread
    const { data: unread } = await sb.from('dms').select('from_user').eq('to_user', me.username).eq('read', false);
    const unreadSet = new Set((unread || []).map(x => x.from_user));

    list.innerHTML = Array.from(partners.entries()).map(([u, a]) => `
        <div class="conv-row" onclick="openChat('${esc(u)}','${esc(a)}')">
            <img src="${a}" onerror="this.src='https://ui-avatars.com/api/?name=${esc(u)}&background=222&color=fff'">
            <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px">@${u}</div>
                <div style="color:#555;font-size:12px;margin-top:1px">${follows.has(u) ? 'Following' : 'You follow each other'}</div>
            </div>
            ${unreadSet.has(u) ? '<div class="unread-dot"></div>' : ''}
        </div>`).join('');

    if (unreadSet.size > 0) {
        document.getElementById('msgBadge').style.display = 'flex';
        document.getElementById('msgBadge').textContent = unreadSet.size;
    }
}

async function openChat(username, avatar) {
    chatTarget = { username, avatar };
    document.getElementById('chatAvatar').src = avatar || `https://ui-avatars.com/api/?name=${username}&background=222&color=fff`;
    document.getElementById('chatName').textContent = '@' + username;
    document.getElementById('chatView').classList.add('open');
    await loadMessages();
    // Mark as read
    if (me) await sb.from('dms').update({ read: true }).eq('to_user', me.username).eq('from_user', username);
    document.getElementById('msgBadge').style.display = 'none';
    // Realtime
    if (chatChannel) sb.removeChannel(chatChannel);
    chatChannel = sb.channel('chat-' + Date.now())
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'dms' }, p => {
            const m = p.new;
            if (!me || !chatTarget) return;
            if ((m.from_user === me.username && m.to_user === chatTarget.username) ||
                (m.from_user === chatTarget.username && m.to_user === me.username)) {
                appendBubble(m);
            }
        }).subscribe();
}

async function loadMessages() {
    const wrap = document.getElementById('chatMessages');
    wrap.innerHTML = '';
    if (!me || !chatTarget) return;
    const { data } = await sb.from('dms').select('*')
        .or(`and(from_user.eq.${me.username},to_user.eq.${chatTarget.username}),and(from_user.eq.${chatTarget.username},to_user.eq.${me.username})`)
        .order('created_at', { ascending: true });
    (data || []).forEach(appendBubble);
}

function appendBubble(m) {
    const wrap = document.getElementById('chatMessages');
    const mine = me && m.from_user === me.username;
    const el = document.createElement('div');
    el.className = 'msg-bubble ' + (mine ? 'msg-mine' : 'msg-theirs');
    el.textContent = m.text;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
}

async function sendMsg() {
    if (!me) return toast('Log in first!');
    if (!chatTarget) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await sb.from('dms').insert({ from_user: me.username, to_user: chatTarget.username, from_avatar: av(me), text, read: false });
    // Send notification to recipient
    await sb.from('notifications').insert({ to_user: chatTarget.username, from_user: me.username, from_avatar: av(me), type: 'message', message: `@${me.username} sent you a message: "${text.slice(0,40)}"` });
}

function closeChat() {
    document.getElementById('chatView').classList.remove('open');
    if (chatChannel) { sb.removeChannel(chatChannel); chatChannel = null; }
    chatTarget = null;
}

// ═══════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════
async function loadNotifs() {
    const list = document.getElementById('notifList');
    if (!me) { list.innerHTML = '<div style="padding:30px;text-align:center;color:#444;font-size:13px">Log in to see notifications</div>'; return; }
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#444;font-size:13px">Loading...</div>';
    const { data } = await sb.from('notifications').select('*').eq('to_user', me.username).order('created_at', { ascending: false }).limit(50);
    if (!data || !data.length) { list.innerHTML = '<div style="padding:30px;text-align:center;color:#444;font-size:13px">No activity yet</div>'; return; }
    list.innerHTML = data.map(n => `
        <div class="notif-row ${n.read ? '' : 'unread'}" onclick="markNotifRead('${n.id}',this)">
            <img src="${n.from_avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${esc(n.from_user)}&background=222&color=fff'">
            <div style="flex:1;min-width:0">
                <p style="font-size:13px;line-height:1.4;color:${n.read?'#888':'#ddd'}">${n.message}</p>
                <span style="font-size:11px;color:#444">${timeAgo(n.created_at)}</span>
            </div>
            ${!n.read ? '<div style="width:8px;height:8px;background:#fe2c55;border-radius:50%;flex-shrink:0"></div>' : ''}
        </div>`).join('');
    // Mark all read
    await sb.from('notifications').update({ read: true }).eq('to_user', me.username).eq('read', false);
    document.getElementById('notifBadge').style.display = 'none';
}

async function markNotifRead(id, row) {
    row.classList.remove('unread');
    const dot = row.querySelector('[style*="background:#fe2c55"]');
    if (dot) dot.remove();
    await sb.from('notifications').update({ read: true }).eq('id', id);
}

function subscribeNotifs() {
    if (!me) return;
    notifChannel = sb.channel('notifs-' + me.username)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `to_user=eq.${me.username}` }, p => {
            const n = p.new;
            toast('🔔 ' + n.message);
            const badge = document.getElementById('notifBadge');
            badge.style.display = 'flex';
            const cur = parseInt(badge.textContent) || 0;
            badge.textContent = cur + 1;
        }).subscribe();
}

function subscribeDMs() {
    if (!me) return;
    dmChannel2 = sb.channel('dm-notif-' + me.username)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'dms', filter: `to_user=eq.${me.username}` }, p => {
            const m = p.new;
            // Only show badge if not currently in that chat
            if (!chatTarget || chatTarget.username !== m.from_user) {
                const badge = document.getElementById('msgBadge');
                badge.style.display = 'flex';
            }
        }).subscribe();
}

// ═══════════════════════════════════════════
// UPLOAD / DELETE
// ═══════════════════════════════════════════
async function handleUpload(event) {
    const file = event.target.files[0];
    if (!me) return toast('Log in to upload!');
    if (!file) return;
    const bar = document.getElementById('uploadBar');
    const fill = document.getElementById('uploadFill');
    bar.style.display = 'block'; fill.style.width = '20%';
    const name = Date.now() + '-' + file.name;
    try {
        const { error: upErr } = await sb.storage.from('videos').upload(name, file);
        if (upErr) throw upErr;
        fill.style.width = '70%';
        const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(name);
        const { error: dbErr } = await sb.from('posts').insert([{ video_url: publicUrl, username: me.username, avatar: av(me), likes: 0, comment_count: 0 }]);
        if (dbErr) throw dbErr;
        fill.style.width = '100%';
        toast('Uploaded!');
        setTimeout(() => location.reload(), 600);
    } catch(e) { alert('Upload failed: ' + e.message); bar.style.display = 'none'; }
    event.target.value = '';
}

async function deletePost(id) {
    if (!confirm('Delete this video?')) return;
    await sb.from('posts').delete().eq('id', id);
    location.reload();
}

function sharePost(url) {
    navigator.clipboard.writeText(url).then(() => toast('Link copied!')).catch(() => toast('Copy failed'));
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function closeAll() { closeComments(); }
function loginWithDiscord() {
    location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
}
function logout() { localStorage.removeItem('tik_u'); location.reload(); }

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => t.classList.remove('on'), 2800);
}

function esc(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(d) {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
}

init();
</script>
