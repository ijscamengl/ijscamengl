<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        .feed-container { height: calc(100vh - 56px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { height: calc(100vh - 56px); scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center; }
        .btn-action { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; transition: transform 0.15s; }
        .btn-action:hover { transform: scale(1.1); }
        .btn-action i { font-size: 26px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
        .btn-action span { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .liked { color: #fe2c55 !important; }
        .heart-pop { animation: heartPop 0.3s ease; }
        @keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }
        .comment-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-radius: 20px 20px 0 0; z-index: 200; transform: translateY(100%); transition: transform 0.3s ease; max-height: 70vh; display: flex; flex-direction: column; }
        .comment-panel.open { transform: translateY(0); }
        .comment-item { display: flex; gap: 10px; padding: 10px 16px; align-items: flex-start; }
        .comment-item img { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
        .overlay.show { display: block; }
        #progressBar { transition: width 0.3s ease; }
        .follow-btn { font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-weight: 700; transition: all 0.2s; border: none; }
        .follow-btn.following { background: #333; color: #aaa; }
        .follow-btn.not-following { background: #fe2c55; color: white; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.97); border: 1px solid #333; padding: 9px 22px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .dm-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 340px; background: #111; z-index: 400; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; border-left: 1px solid #222; }
        .dm-panel.open { transform: translateX(0); }
        .dm-chat { position: fixed; top: 0; right: 340px; bottom: 0; width: 340px; background: #0d0d0d; z-index: 400; transform: translateX(200%); transition: transform 0.3s ease; display: flex; flex-direction: column; border-left: 1px solid #222; }
        .dm-chat.open { transform: translateX(0); }
        .dm-msg { padding: 8px 14px; border-radius: 18px; max-width: 78%; margin: 2px 12px; font-size: 14px; line-height: 1.4; }
        .dm-msg.mine { background: #fe2c55; align-self: flex-end; }
        .dm-msg.theirs { background: #2a2a2a; align-self: flex-start; }
        .profile-modal { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; }
        .sidebar-icon { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 10px 16px; border-radius: 10px; transition: background 0.2s; }
        .sidebar-icon:hover { background: rgba(255,255,255,0.06); }
        .sidebar-icon i { font-size: 22px; color: #777; }
        .sidebar-icon span { font-size: 10px; color: #666; }
        .sidebar-icon.active i { color: white; }
        .sidebar-icon.active span { color: white; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-14 flex items-center justify-between px-4 shrink-0 z-50 bg-black border-b border-gray-900">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="h-6 brightness-0 invert" alt="TikTok">
        <div id="uploadStatus" class="hidden w-36 bg-gray-800 rounded-full h-1.5">
            <div id="progressBar" class="bg-[#fe2c55] h-1.5 rounded-full" style="width:0%"></div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="document.getElementById('fileInput').click()" class="bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded font-bold text-sm text-white">+ Upload</button>
            <input type="file" id="fileInput" class="hidden" accept="video/*" onchange="handleUpload(event)">
            <button id="loginBtn" onclick="loginWithDiscord()" class="bg-[#fe2c55] text-white px-4 py-1.5 rounded font-bold text-sm">Log in</button>
            <div id="userProfile" style="display:none" class="flex items-center gap-2">
                <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-gray-600 cursor-pointer object-cover" onclick="openProfile(null)">
                <button onclick="logout()" class="text-xs text-gray-500 hover:text-white">Logout</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-20 border-r border-gray-900 py-4 hidden lg:flex flex-col items-center gap-1 bg-black shrink-0">
            <div class="sidebar-icon active" id="tab-foryou" onclick="setTab('foryou')">
                <i class="fas fa-home"></i><span>For You</span>
            </div>
            <div class="sidebar-icon" id="tab-following" onclick="setTab('following')">
                <i class="fas fa-user-friends"></i><span>Following</span>
            </div>
        </aside>
        <main id="feed" class="flex-1 feed-container bg-black flex flex-col items-center">
            <div class="h-full flex items-center text-gray-600 text-sm">Loading...</div>
        </main>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- Comments -->
    <div class="comment-panel" id="commentPanel">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 shrink-0">
            <span class="font-bold text-base" id="commentTitle">Comments</span>
            <button onclick="closeComments()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="commentList" class="flex-1 overflow-y-auto py-1"></div>
        <div class="p-3 border-t border-gray-800 flex gap-2 items-center shrink-0">
            <img id="commentAvatar" src="" class="w-8 h-8 rounded-full object-cover bg-gray-700 shrink-0">
            <input id="commentInput" type="text" placeholder="Add a comment..." maxlength="200"
                class="flex-1 bg-gray-800 rounded-full px-4 py-2 text-sm text-white outline-none placeholder-gray-600"
                onkeydown="if(event.key==='Enter') submitComment()">
            <button onclick="submitComment()" class="text-[#fe2c55] font-bold text-sm px-1 hover:text-red-400 shrink-0">Post</button>
        </div>
    </div>

    <!-- DM List -->
    <div class="dm-panel" id="dmListPanel">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 shrink-0">
            <span class="font-bold text-base">Messages</span>
            <button onclick="closeDMs()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="dmList" class="flex-1 overflow-y-auto"></div>
    </div>

    <!-- DM Chat -->
    <div class="dm-chat" id="dmChatPanel">
        <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-800 shrink-0">
            <button onclick="closeDMChat()" class="text-gray-500 hover:text-white mr-1"><i class="fas fa-arrow-left"></i></button>
            <img id="dmChatAvatar" src="" class="w-8 h-8 rounded-full object-cover">
            <span id="dmChatName" class="font-bold text-sm"></span>
        </div>
        <div id="dmMessages" class="flex-1 overflow-y-auto py-2 flex flex-col"></div>
        <div class="p-3 border-t border-gray-800 flex gap-2 items-center shrink-0">
            <input id="dmInput" type="text" placeholder="Message..."
                class="flex-1 bg-gray-800 rounded-full px-4 py-2 text-sm text-white outline-none placeholder-gray-600"
                onkeydown="if(event.key==='Enter') sendDM()">
            <button onclick="sendDM()" class="bg-[#fe2c55] text-white rounded-full w-9 h-9 flex items-center justify-center shrink-0 hover:bg-red-600">
                <i class="fas fa-paper-plane text-xs"></i>
            </button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="profile-modal" id="profileModal" style="display:none">
        <div class="absolute inset-0 bg-black bg-opacity-75" onclick="closeProfile()"></div>
        <div class="relative bg-gray-900 rounded-2xl p-6 w-72 text-center border border-gray-800" style="z-index:1">
            <button onclick="closeProfile()" class="absolute top-3 right-3 text-gray-600 hover:text-white"><i class="fas fa-times"></i></button>
            <img id="profileAvatar" src="" class="w-20 h-20 rounded-full mx-auto mb-3 border-2 border-gray-700 object-cover">
            <h2 id="profileUsername" class="font-bold text-lg mb-3"></h2>
            <div class="flex justify-center gap-8 mb-4">
                <div><div id="profileFollowers" class="font-bold text-xl">0</div><div class="text-gray-500 text-xs">Followers</div></div>
                <div><div id="profileFollowingCount" class="font-bold text-xl">0</div><div class="text-gray-500 text-xs">Following</div></div>
            </div>
            <div id="profileActions" class="flex gap-2 justify-center"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = 'https://riahwqxjgfxwskypnsxs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYWh3cXhqZ2Z4d3NreXBuc3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY5OTgsImV4cCI6MjA4OTA3Mjk5OH0.rTgRS8G1LU7oKkvFicizAUxPCryFUIyPV1vSCHR88ZY';
        const CLIENT_ID = '1484189679762014352';
        const REDIRECT_URI = 'https://ijscamengl.github.io/ijscamengl/';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentPostId = null, currentTab = 'foryou';
        let dmTarget = null, profileTarget = null, dmChannel = null;
        let likedPosts = new Set(), followedUsers = new Set();
        let ioObserver = null, toastTimer = null;

        async function init() {
            // Handle Discord OAuth token in hash
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                    const user = await res.json();
                    if (user && user.id) localStorage.setItem('tik_user', JSON.stringify(user));
                } catch(e) { console.error(e); }
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const saved = localStorage.getItem('tik_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    // Show user UI
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('userProfile').style.display = 'flex';
                    document.getElementById('userAvatar').src = avatarUrl(currentUser);
                    document.getElementById('commentAvatar').src = avatarUrl(currentUser);
                    // Load user data
                    const [{ data: likes }, { data: follows }] = await Promise.all([
                        sb.from('likes').select('post_id').eq('username', currentUser.username),
                        sb.from('follows').select('following').eq('follower', currentUser.username)
                    ]);
                    if (likes) likes.forEach(l => likedPosts.add(l.post_id));
                    if (follows) follows.forEach(f => followedUsers.add(f.following));
                } catch(e) { localStorage.removeItem('tik_user'); currentUser = null; }
            }
            loadVideos();
        }

        function avatarUrl(user) {
            if (!user) return '';
            return user.avatar
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : `https://ui-avatars.com/api/?name=${user.username}&background=333&color=fff`;
        }

        function setupAutoplay() {
            if (ioObserver) ioObserver.disconnect();
            let playing = null;
            ioObserver = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const vid = entry.target.querySelector('video');
                    if (!vid) return;
                    if (entry.isIntersecting) {
                        if (playing && playing !== vid) { playing.pause(); playing.currentTime = 0; }
                        vid.muted = true;
                        vid.play().catch(() => {});
                        playing = vid;
                    } else {
                        vid.pause();
                    }
                });
            }, { threshold: 0.65 });
            document.querySelectorAll('.video-card').forEach(c => ioObserver.observe(c));
        }

        async function loadVideos() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '<div class="h-full flex items-center text-gray-600 text-sm">Loading...</div>';
            let query = sb.from('posts').select('*').order('created_at', { ascending: false });
            if (currentTab === 'following') {
                const arr = Array.from(followedUsers);
                if (!arr.length) {
                    feed.innerHTML = '<div class="h-full flex items-center text-gray-500 text-sm text-center px-10">Follow creators to see their videos!</div>';
                    return;
                }
                query = query.in('username', arr);
            }
            const { data: posts, error } = await query;
            if (error || !posts || !posts.length) {
                feed.innerHTML = '<div class="h-full flex items-center text-gray-600 text-sm">No videos yet!</div>';
                return;
            }
            feed.innerHTML = posts.map(post => {
                const isOwner = currentUser && currentUser.username === post.username;
                const liked = likedPosts.has(post.id);
                const isFollowing = followedUsers.has(post.username);
                const isSelf = currentUser && currentUser.username === post.username;
                const safeUser = post.username.replace(/'/g, "\\'");
                const safeAvatar = (post.avatar || '').replace(/'/g, "\\'");
                return `
                <div class="video-card w-full" data-id="${post.id}">
                    <div class="relative w-full h-full max-w-sm overflow-hidden bg-black flex items-center">
                        <video src="${post.video_url}" class="w-full h-full object-cover" loop muted playsinline preload="metadata"></video>
                        <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 45%)"></div>
                        <div class="absolute bottom-14 left-3 right-20 z-10">
                            <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                <img src="${post.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${safeUser}&background=333&color=fff'"
                                    class="w-8 h-8 rounded-full border-2 border-white object-cover cursor-pointer shrink-0"
                                    onclick="openProfile('${safeUser}','${safeAvatar}')">
                                <span class="font-bold text-sm cursor-pointer" onclick="openProfile('${safeUser}','${safeAvatar}')">@${post.username}</span>
                                ${!isSelf ? `<button class="follow-btn ${isFollowing ? 'following' : 'not-following'}" onclick="toggleFollow('${safeUser}','${safeAvatar}',this)">${isFollowing ? 'Following' : 'Follow'}</button>` : ''}
                            </div>
                            <p class="text-xs text-gray-300">#fyp #trending</p>
                        </div>
                        <div class="absolute right-3 bottom-14 flex flex-col gap-5 items-center z-10">
                            <div class="btn-action" onclick="toggleLike('${post.id}',this)">
                                <i class="fas fa-heart ${liked ? 'liked' : 'text-white'}"></i>
                                <span id="lc-${post.id}">${post.likes || 0}</span>
                            </div>
                            <div class="btn-action" onclick="openComments('${post.id}')">
                                <i class="fas fa-comment-dots text-white"></i>
                                <span id="cc-${post.id}">${post.comment_count || 0}</span>
                            </div>
                            <div class="btn-action" onclick="sharePost('${post.video_url}')">
                                <i class="fas fa-share text-white"></i>
                                <span>Share</span>
                            </div>
                            ${isOwner ? `<div class="btn-action" onclick="deletePost('${post.id}')"><i class="fas fa-trash-alt" style="color:#f87171"></i><span style="color:#f87171">Delete</span></div>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
            setupAutoplay();
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tab-foryou').classList.toggle('active', tab === 'foryou');
            document.getElementById('tab-following').classList.toggle('active', tab === 'following');
            loadVideos();
        }

        async function toggleLike(postId, btn) {
            if (!currentUser) return showToast('Log in to like!');
            const heart = btn.querySelector('i');
            const countEl = document.getElementById('lc-' + postId);
            if (likedPosts.has(postId)) {
                likedPosts.delete(postId);
                heart.classList.remove('liked');
                countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);
                await sb.from('likes').delete().eq('post_id', postId).eq('username', currentUser.username);
                await sb.rpc('decrement_likes', { post_id: postId });
            } else {
                likedPosts.add(postId);
                heart.classList.add('liked');
                heart.classList.add('heart-pop');
                setTimeout(() => heart.classList.remove('heart-pop'), 350);
                countEl.textContent = parseInt(countEl.textContent) + 1;
                await sb.from('likes').insert({ post_id: postId, username: currentUser.username });
                await sb.rpc('increment_likes', { post_id: postId });
            }
        }

        async function openComments(postId) {
            currentPostId = postId;
            document.getElementById('commentPanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            await loadComments();
        }

        async function loadComments() {
            const list = document.getElementById('commentList');
            list.innerHTML = '<div class="text-center text-gray-600 py-6 text-sm">Loading...</div>';
            const { data } = await sb.from('comments').select('*').eq('post_id', currentPostId).order('created_at', { ascending: true });
            const count = data ? data.length : 0;
            document.getElementById('commentTitle').textContent = count + ' Comment' + (count !== 1 ? 's' : '');
            const ccEl = document.getElementById('cc-' + currentPostId);
            if (ccEl) ccEl.textContent = count;
            if (!count) { list.innerHTML = '<div class="text-center text-gray-600 py-10 text-sm">No comments yet!</div>'; return; }
            list.innerHTML = data.map(c => `
                <div class="comment-item">
                    <img src="${c.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${c.username}&background=333&color=fff'">
                    <div>
                        <span class="font-bold text-sm">${c.username}</span>
                        <p class="text-sm text-gray-300 mt-0.5 break-words">${escHtml(c.text)}</p>
                        <span class="text-xs text-gray-600">${timeAgo(c.created_at)}</span>
                    </div>
                </div>`).join('');
            list.scrollTop = list.scrollHeight;
        }

        async function submitComment() {
            if (!currentUser) return showToast('Log in to comment!');
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await sb.from('comments').insert({ post_id: currentPostId, username: currentUser.username, avatar: avatarUrl(currentUser), text });
            await loadComments();
        }

        function closeComments() {
            document.getElementById('commentPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        async function toggleFollow(username, avatar, btn) {
            if (!currentUser) return showToast('Log in to follow!');
            if (username === currentUser.username) return;
            if (followedUsers.has(username)) {
                followedUsers.delete(username);
                btn.textContent = 'Follow'; btn.className = 'follow-btn not-following';
                await sb.from('follows').delete().eq('follower', currentUser.username).eq('following', username);
            } else {
                followedUsers.add(username);
                btn.textContent = 'Following'; btn.className = 'follow-btn following';
                await sb.from('follows').insert({ follower: currentUser.username, following: username });
                showToast('Following @' + username);
            }
        }

        async function openProfile(username, avatar) {
            if (!username && currentUser) { username = currentUser.username; avatar = avatarUrl(currentUser); }
            if (!username) return;
            profileTarget = { username, avatar };
            document.getElementById('profileAvatar').src = avatar || `https://ui-avatars.com/api/?name=${username}&background=333&color=fff`;
            document.getElementById('profileUsername').textContent = '@' + username;
            const [{ count: followers }, { count: following }] = await Promise.all([
                sb.from('follows').select('*', { count: 'exact', head: true }).eq('following', username),
                sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower', username)
            ]);
            document.getElementById('profileFollowers').textContent = followers || 0;
            document.getElementById('profileFollowingCount').textContent = following || 0;
            const isSelf = currentUser && currentUser.username === username;
            const isFollowing = followedUsers.has(username);
            const actions = document.getElementById('profileActions');
            if (isSelf) {
                actions.innerHTML = '<span class="text-gray-500 text-sm">Your profile</span>';
            } else {
                actions.innerHTML = `
                    <button id="profFollowBtn" onclick="toggleFollowProfile()"
                        class="px-5 py-2 rounded font-bold text-sm ${isFollowing ? 'bg-gray-700 text-gray-300' : 'bg-[#fe2c55] text-white'}">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                    <button onclick="openDMFromProfile()" class="bg-gray-800 text-white px-5 py-2 rounded font-bold text-sm hover:bg-gray-700">Message</button>`;
            }
            document.getElementById('profileModal').style.display = 'flex';
        }

        async function toggleFollowProfile() {
            if (!profileTarget) return;
            const dummyBtn = { className: '', textContent: '' };
            await toggleFollow(profileTarget.username, profileTarget.avatar, dummyBtn);
            const btn = document.getElementById('profFollowBtn');
            if (btn) {
                const isNow = followedUsers.has(profileTarget.username);
                btn.textContent = isNow ? 'Following' : 'Follow';
                btn.className = 'px-5 py-2 rounded font-bold text-sm ' + (isNow ? 'bg-gray-700 text-gray-300' : 'bg-[#fe2c55] text-white');
            }
            const { count } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following', profileTarget.username);
            document.getElementById('profileFollowers').textContent = count || 0;
        }

        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }

        function openDMFromProfile() {
            closeProfile();
            if (!profileTarget) return;
            openDMs();
            openDMChat(profileTarget.username, profileTarget.avatar);
        }

        async function openDMs() {
            if (!currentUser) return showToast('Log in to message!');
            document.getElementById('dmListPanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            const dmList = document.getElementById('dmList');
            dmList.innerHTML = '<div class="text-center text-gray-600 py-6 text-sm">Loading...</div>';
            const { data: sent } = await sb.from('dms').select('to_user').eq('from_user', currentUser.username);
            const { data: recv } = await sb.from('dms').select('from_user, from_avatar').eq('to_user', currentUser.username);
            const partners = new Map();
            (sent || []).forEach(m => partners.set(m.to_user, null));
            (recv || []).forEach(m => partners.set(m.from_user, m.from_avatar));
            followedUsers.forEach(u => { if (!partners.has(u)) partners.set(u, null); });
            for (const [u, av] of partners) {
                if (!av) {
                    const { data } = await sb.from('posts').select('avatar').eq('username', u).limit(1);
                    partners.set(u, data && data[0] ? data[0].avatar : `https://ui-avatars.com/api/?name=${u}&background=333&color=fff`);
                }
            }
            if (!partners.size) {
                dmList.innerHTML = '<div class="text-center text-gray-500 text-sm py-10 px-4">Follow people to message them!</div>';
                return;
            }
            dmList.innerHTML = Array.from(partners.entries()).map(([u, av]) => `
                <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 cursor-pointer" onclick="openDMChat('${u}','${av}')">
                    <img src="${av}" onerror="this.src='https://ui-avatars.com/api/?name=${u}&background=333&color=fff'" class="w-10 h-10 rounded-full object-cover">
                    <span class="font-bold text-sm">@${u}</span>
                </div>`).join('');
        }

        async function openDMChat(username, avatar) {
            dmTarget = { username, avatar };
            document.getElementById('dmChatName').textContent = '@' + username;
            document.getElementById('dmChatAvatar').src = avatar || `https://ui-avatars.com/api/?name=${username}&background=333&color=fff`;
            document.getElementById('dmChatPanel').classList.add('open');
            await loadDMMessages();
            if (dmChannel) sb.removeChannel(dmChannel);
            dmChannel = sb.channel('dms-' + Date.now())
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'dms' }, payload => {
                    const m = payload.new;
                    if (!currentUser || !dmTarget) return;
                    if ((m.from_user === currentUser.username && m.to_user === dmTarget.username) ||
                        (m.from_user === dmTarget.username && m.to_user === currentUser.username)) appendMsg(m);
                }).subscribe();
        }

        async function loadDMMessages() {
            const wrap = document.getElementById('dmMessages');
            wrap.innerHTML = '';
            if (!currentUser || !dmTarget) return;
            const { data } = await sb.from('dms').select('*')
                .or(`and(from_user.eq.${currentUser.username},to_user.eq.${dmTarget.username}),and(from_user.eq.${dmTarget.username},to_user.eq.${currentUser.username})`)
                .order('created_at', { ascending: true });
            (data || []).forEach(appendMsg);
        }

        function appendMsg(m) {
            const wrap = document.getElementById('dmMessages');
            const isMine = currentUser && m.from_user === currentUser.username;
            const el = document.createElement('div');
            el.className = 'dm-msg ' + (isMine ? 'mine' : 'theirs');
            el.textContent = m.text;
            wrap.appendChild(el);
            wrap.scrollTop = wrap.scrollHeight;
        }

        async function sendDM() {
            if (!currentUser || !dmTarget) return showToast('Log in to message!');
            const input = document.getElementById('dmInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await sb.from('dms').insert({ from_user: currentUser.username, to_user: dmTarget.username, from_avatar: avatarUrl(currentUser), text });
        }

        function closeDMChat() {
            document.getElementById('dmChatPanel').classList.remove('open');
            if (dmChannel) { sb.removeChannel(dmChannel); dmChannel = null; }
            dmTarget = null;
        }

        function closeDMs() {
            closeDMChat();
            document.getElementById('dmListPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        async function handleUpload(event) {
            const file = event.target.files[0];
            if (!currentUser) return showToast('Log in to upload!');
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            const bar = document.getElementById('progressBar');
            status.classList.remove('hidden');
            bar.style.width = '20%';
            const fileName = Date.now() + '-' + file.name;
            try {
                const { error: upErr } = await sb.storage.from('videos').upload(fileName, file);
                if (upErr) throw upErr;
                bar.style.width = '70%';
                const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(fileName);
                const { error: dbErr } = await sb.from('posts').insert([{ video_url: publicUrl, username: currentUser.username, avatar: avatarUrl(currentUser), likes: 0, comment_count: 0 }]);
                if (dbErr) throw dbErr;
                bar.style.width = '100%';
                showToast('Uploaded!');
                setTimeout(() => window.location.reload(), 600);
            } catch(err) {
                alert('Upload failed: ' + err.message);
                status.classList.add('hidden');
            }
            event.target.value = '';
        }

        async function deletePost(id) {
            if (!confirm('Delete this video?')) return;
            await sb.from('posts').delete().eq('id', id);
            window.location.reload();
        }

        function sharePost(url) {
            navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => showToast('Copy failed'));
        }

        function closeAll() { closeComments(); closeDMs(); }

        function loginWithDiscord() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        function logout() { localStorage.removeItem('tik_user'); window.location.reload(); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function timeAgo(d) {
            const s = (Date.now() - new Date(d)) / 1000;
            if (s < 60) return 'just now';
            if (s < 3600) return Math.floor(s/60) + 'm ago';
            if (s < 86400) return Math.floor(s/3600) + 'h ago';
            return Math.floor(s/86400) + 'd ago';
        }

        init();
    </script>
</body>
</html>
