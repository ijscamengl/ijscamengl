<header class="h-16 border-b border-gray-200 flex items-center justify-between px-6">
    <div class="font-bold text-2xl">TikTok</div>
    <div id="auth-section">
        <a href="/login" class="bg-[#fe2c55] text-white px-6 py-2 rounded font-bold">Log in</a>
    </div>
</header>

<main class="flex-1 flex flex-col items-center bg-white overflow-y-auto pt-10">
    <div id="upload-box" class="hidden mb-10 p-4 border-2 border-dashed border-gray-300 rounded-lg">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="video" accept="video/*" class="mb-2">
            <button type="submit" class="bg-black text-white px-4 py-1 rounded">Post Video</button>
        </form>
    </div>

    <div id="fyp-feed" class="space-y-20">
        </div>
</main>

<script>
    async function loadFeed() {
        const res = await fetch('/videos');
        const data = await res.json();
        
        if (data.user) {
            document.getElementById('auth-section').innerHTML = `<img src="${data.avatar}" class="w-10 h-10 rounded-full">`;
            document.getElementById('upload-box').classList.remove('hidden');
        }

        const feed = document.getElementById('fyp-feed');
        feed.innerHTML = data.videos.map(v => `
            <div class="flex space-x-4">
                <img src="${v.avatar}" class="w-12 h-12 rounded-full">
                <div>
                    <p class="font-bold">${v.username}</p>
                    <video src="${v.url}" controls class="h-[500px] rounded-lg mt-2 shadow-lg"></video>
                </div>
            </div>
        `).join('');
    }
    loadFeed();
</script>
