<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: white; font-family: 'proxima-nova', sans-serif; overflow: hidden; }
        .sidebar-item:hover { background-color: rgba(22, 24, 35, 0.03); }
        .active-tab { color: #fe2c55; }
        .feed-container { height: calc(100vh - 64px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .video-card { height: calc(100vh - 64px); scroll-snap-align: start; }
        .feed-container::-webkit-scrollbar { display: none; }
        #progressBar { transition: width 0.3s ease; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 border-b border-gray-200 flex items-center justify-between px-6 shrink-0 z-50 bg-white">
        <div class="flex items-center">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="h-7" alt="TikTok">
        </div>
        
        <div id="uploadStatus" class="hidden flex-1 max-w-xs mx-8">
            <div class="w-full bg-gray-200 rounded-full h-1.5">
                <div id="progressBar" class="bg-[#fe2c55] h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <p id="statusText" class="text-[10px] text-center mt-1 font-bold text-[#fe2c55] uppercase tracking-widest">Uploading...</p>
        </div>

        <div class="flex items-center space-x-3">
            <button onclick="document.getElementById('fileInput').click()" class="flex items-center space-x-2 text-sm font-bold text-gray-800 hover:bg-gray-100 px-4 py-1.5 rounded border border-gray-200">
                <i class="fas fa-plus"></i> <span>Upload</span>
            </button>
            <input type="file" id="fileInput" class="hidden" accept="video/*" onchange="handleUpload(event)">
            
            <button id="loginBtn" onclick="loginWithDiscord()" class="bg-[#fe2c55] text-white px-5 py-1.5 rounded font-bold text-sm">Log in</button>
            
            <div id="userProfile" class="hidden flex items-center space-x-3">
                <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-gray-200 object-cover">
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-black">Logout</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 px-2 py-4 border-r border-gray-100 shrink-0 overflow-y-auto hidden lg:block">
            <nav class="space-y-0.5">
                <div class="sidebar-item active-tab flex items-center space-x-3 px-3 py-2.5 rounded-lg font-bold text-lg cursor-pointer">
                    <i class="fas fa-home w-6 text-xl"></i> <span>For You</span>
                </div>
                <div class="sidebar-item flex items-center space-x-3 px-3 py-2.5 rounded-lg font-bold text-lg text-gray-800 cursor-pointer">
                    <i class="far fa-compass w-6 text-xl"></i> <span>Explore</span>
                </div>
                <div class="sidebar-item flex items-center space-x-3 px-3 py-2.5 rounded-lg font-bold text-lg text-gray-800 cursor-pointer">
                    <i class="fas fa-user-friends w-6 text-xl"></i> <span>Following</span>
                </div>
            </nav>
        </aside>

        <main id="feed" class="flex-1 feed-container bg-white flex flex-col items-center">
            <div id="loader" class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#fe2c55]"></div>
                <p class="font-bold">Loading videos...</p>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://riahwqxjgfxwskypnsxs.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY_HERE'; // <--- PASTE YOUR ANON KEY HERE
        const CLIENT_ID = '1484189679762014352';
        const REDIRECT_URI = 'https://ijscamengl.github.io/ijscamengl/';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function loginWithDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        async function init() {
            // Handle redirect token
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                    const user = await res.json();
                    localStorage.setItem('tiktok_user', JSON.stringify(user));
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) { console.error("Login Error", e); }
            }

            // Check Persistence
            const savedUser = localStorage.getItem('tiktok_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            }

            loadVideos();
        }

        async function loadVideos() {
            const { data: posts, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            
            if (error) {
                feed.innerHTML = `<div class="p-10 text-red-500">Error loading feed: ${error.message}</div>`;
                return;
            }

            if (!posts || posts.length === 0) {
                feed.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400 font-bold"><i class="fas fa-video-slash text-4xl mb-2"></i><p>No videos yet!</p></div>';
                return;
            }

            feed.innerHTML = posts.map(post => `
                <div class="video-card w-full max-w-[500px] flex items-center justify-center relative py-8">
                    <div class="relative h-full aspect-[9/16] bg-black rounded-xl overflow-hidden shadow-2xl flex items-center">
                        <video src="${post.video_url}" class="w-full h-full object-cover" loop controls></video>
                        <div class="absolute bottom-4 left-4 text-white z-10 pr-10">
                            <p class="font-bold">@${post.username || 'user'}</p>
                            <p class="text-sm">Video description #fyp #clone</p>
                        </div>
                    </div>
                    <div class="flex flex-col ml-4 space-y-5 items-center self-end mb-12">
                        <img src="${post.avatar || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full border-2 border-white shadow-md">
                        <div class="text-center cursor-pointer"><i class="fas fa-heart text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                        <div class="text-center cursor-pointer"><i class="fas fa-comment-dots text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                        <div class="text-center cursor-pointer"><i class="fas fa-bookmark text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                        <div class="text-center cursor-pointer"><i class="fas fa-share text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                    </div>
                </div>
            `).join('');
        }

        async function handleUpload(event) {
            const file = event.target.files[0];
            const user = JSON.parse(localStorage.getItem('tiktok_user'));
            
            if (!user) {
                alert("Please log in with Discord first!");
                return;
            }
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('statusText');
            
            status.classList.remove('hidden');
            bar.style.width = '10%';
            text.innerText = "Connecting...";

            const fileName = `${Date.now()}-${file.name}`;
            
            try {
                // 1. Storage Upload
                text.innerText = "Uploading Video File...";
                const { data, error: uploadErr } = await supabaseClient.storage.from('videos').upload(fileName, file);
                if (uploadErr) throw uploadErr;
                
                bar.style.width = '60%';
                text.innerText = "Processing URL...";

                // 2. Metadata Save
                const { data: { publicUrl } } = supabaseClient.storage.from('videos').getPublicUrl(fileName);

                text.innerText = "Saving to Feed...";
                const { error: dbErr } = await supabaseClient.from('posts').insert([{
                    video_url: publicUrl,
                    username: user.username,
                    avatar: `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                }]);
                
                if (dbErr) throw dbErr;

                bar.style.width = '100%';
                text.innerText = "Success!";
                
                setTimeout(() => {
                    status.classList.add('hidden');
                    window.location.reload();
                }, 800);

            } catch (err) {
                console.error(err);
                alert("Upload failed: " + err.message + "\n\nTip: Make sure you ran the SQL Editor fix in Supabase!");
                status.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        init();
    </script>
</body>
</html>
