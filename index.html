<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Notifier | schere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d0d0f] text-zinc-100 min-h-screen flex flex-col items-center p-6 font-sans">
    <div class="w-full max-w-xl">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black tracking-tighter text-white">HOOK <span class="text-blue-500">NOTIFIER</span></h1>
            <button id="authBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-bold transition">Login with Discord</button>
        </header>

        <div id="dashboard" class="hidden space-y-6">
            <div class="bg-[#16161a] border border-zinc-800 p-8 rounded-2xl shadow-2xl">
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-2 font-semibold uppercase">Header Message</label>
                        <input type="text" id="testMsg" placeholder="Enter message..." class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition text-white">
                    </div>
                    <div class="flex items-center justify-between p-4 bg-black/50 border border-zinc-800 rounded-xl">
                        <span class="text-sm font-medium">Auto-Joiner Status</span>
                        <input type="checkbox" id="ajToggle" class="w-5 h-5 accent-blue-500">
                    </div>
                    <button id="saveBtn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-zinc-200 transition uppercase text-sm tracking-widest">Sync to Roblox</button>
                    <p id="status" class="text-center text-xs font-bold text-blue-400 h-4 mt-2"></p>
                </div>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Your Sync ID:</p>
                <code id="userKeyDisplay" class="text-blue-400 text-xs font-mono">Loading...</code>
            </div>
        </div>
        <div id="loginPrompt" class="text-center py-20 text-zinc-500">Please login to sync settings.</div>
    </div>

    <script>
        const SB_URL = "https://riahwqxjgfxwskypnsxs.supabase.co";
        const SB_KEY = "sb_publishable_7pGP3l7rkLG31QEg6WC_2w_END7EKMt";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const SITE_URL = "https://ijscamengl.github.io/ijscamengl/";

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('authBtn').innerText = "Logout";
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('loginPrompt').classList.add('hidden');
                document.getElementById('userKeyDisplay').innerText = user.id;
                
                let { data } = await supabaseClient.from('configs').select('*').eq('id', user.id).single();
                if (data) {
                    document.getElementById('testMsg').value = data.message || "";
                    document.getElementById('ajToggle').checked = data.enabled || false;
                }
            }
        }

        document.getElementById('authBtn').onclick = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                await supabaseClient.auth.signOut();
                location.reload();
            } else {
                await supabaseClient.auth.signInWithOAuth({ 
                    provider: 'discord',
                    options: { redirectTo: SITE_URL }
                });
            }
        };

        document.getElementById('saveBtn').onclick = async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;
            document.getElementById('status').innerText = "SAVING...";
            const { error } = await supabaseClient.from('configs').upsert({
                id: user.id,
                message: document.getElementById('testMsg').value,
                enabled: document.getElementById('ajToggle').checked
            });
            document.getElementById('status').innerText = error ? "ERROR" : "✅ SYNCED!";
            setTimeout(() => document.getElementById('status').innerText = "", 2000);
        };
        init();
    </script>
</body>
</html>
