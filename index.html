<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: white; font-family: sans-serif; overflow: hidden; }
        .feed-container { height: calc(100vh - 64px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .video-card { height: calc(100vh - 64px); scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
        .feed-container::-webkit-scrollbar { display: none; }
        #progressBar { transition: width 0.3s ease; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 border-b flex items-center justify-between px-6 bg-white shrink-0 z-50">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="h-7" alt="TikTok">
        
        <div id="uploadStatus" class="hidden w-48 bg-gray-200 rounded-full h-2 mx-4">
            <div id="progressBar" class="bg-[#fe2c55] h-2 rounded-full" style="width: 0%"></div>
        </div>

        <div class="flex items-center space-x-3">
            <button onclick="document.getElementById('fileInput').click()" class="bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded font-bold text-sm">+ Upload</button>
            <input type="file" id="fileInput" class="hidden" accept="video/*" onchange="handleUpload(event)">
            
            <button id="loginBtn" onclick="loginWithDiscord()" class="bg-[#fe2c55] text-white px-5 py-1.5 rounded font-bold text-sm">Log in</button>
            <div id="userProfile" class="hidden flex items-center space-x-3">
                <img id="userAvatar" src="" class="w-8 h-8 rounded-full border">
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-black italic">Logout</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r p-4 hidden lg:block">
            <nav class="space-y-6">
                <div class="text-[#fe2c55] font-bold text-xl flex items-center gap-3"><i class="fas fa-home"></i> For You</div>
                <div class="text-gray-700 font-bold text-xl flex items-center gap-3 cursor-pointer"><i class="far fa-compass"></i> Explore</div>
                <div class="text-gray-700 font-bold text-xl flex items-center gap-3 cursor-pointer"><i class="fas fa-user-friends"></i> Friends</div>
            </nav>
        </aside>

        <main id="feed" class="flex-1 feed-container bg-white flex flex-col items-center">
            <div class="h-full flex items-center text-gray-400">Loading feed...</div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://riahwqxjgfxwskypnsxs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYWh3cXhqZ2Z4d3NreXBuc3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTY5OTgsImV4cCI6MjA4OTA3Mjk5OH0.rTgRS8G1LU7oKkvFicizAUxPCryFUIyPV1vSCHR88ZY';
        const CLIENT_ID = '1484189679762014352';
        const REDIRECT_URI = 'https://ijscamengl.github.io/ijscamengl/';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                const user = await res.json();
                localStorage.setItem('tiktok_user', JSON.stringify(user));
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const savedUser = localStorage.getItem('tiktok_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            }
            loadVideos();
        }

        async function loadVideos() {
            const feed = document.getElementById('feed');
            const currentUser = JSON.parse(localStorage.getItem('tiktok_user'));
            
            const { data: posts, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            
            if (error || !posts || posts.length === 0) {
                feed.innerHTML = '<div class="h-full flex items-center text-gray-400">No videos yet!</div>';
                return;
            }

            feed.innerHTML = posts.map(post => {
                // Show delete button only if you are the uploader
                const isOwner = currentUser && currentUser.username === post.username;
                return `
                <div class="video-card w-full max-w-[480px] py-10">
                    <div class="relative h-full aspect-[9/16] bg-black rounded-xl overflow-hidden shadow-2xl flex items-center">
                        <video src="${post.video_url}" class="w-full h-full object-cover" loop controls></video>
                        <div class="absolute bottom-6 left-4 text-white z-10 pr-10">
                            <p class="font-bold text-lg">@${post.username}</p>
                            <p class="text-sm">Video description #fyp</p>
                        </div>
                    </div>
                    <div class="flex flex-col ml-4 space-y-6 items-center self-end mb-12">
                        <img src="${post.avatar}" class="w-12 h-12 rounded-full border-2 border-white">
                        <div class="text-center cursor-pointer"><i class="fas fa-heart text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                        <div class="text-center cursor-pointer"><i class="fas fa-comment-dots text-2xl text-gray-800"></i><p class="text-xs font-bold text-gray-500">0</p></div>
                        ${isOwner ? `<button onclick="deletePost('${post.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt text-xl"></i></button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function handleUpload(event) {
            const file = event.target.files[0];
            const user = JSON.parse(localStorage.getItem('tiktok_user'));
            if (!user) return alert("Please login with Discord to upload!");
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            const bar = document.getElementById('progressBar');
            status.classList.remove('hidden');
            bar.style.width = '30%';

            const fileName = `${Date.now()}-${file.name}`;
            
            try {
                const { data, error: uploadErr } = await supabaseClient.storage.from('videos').upload(fileName, file);
                if (uploadErr) throw uploadErr;
                
                bar.style.width = '70%';
                const { data: { publicUrl } } = supabaseClient.storage.from('videos').getPublicUrl(fileName);

                const { error: dbErr } = await supabaseClient.from('posts').insert([{
                    video_url: publicUrl,
                    username: user.username,
                    avatar: `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                }]);
                if (dbErr) throw dbErr;

                bar.style.width = '100%';
                setTimeout(() => window.location.reload(), 500);
            } catch (err) {
                alert("Upload failed: " + err.message);
                status.classList.add('hidden');
            }
        }

        async function deletePost(id) {
            if (!confirm("Delete this video?")) return;
            const { error } = await supabaseClient.from('posts').delete().eq('id', id);
            if (error) alert("Error deleting: " + error.message);
            else window.location.reload();
        }

        function loginWithDiscord() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        function logout() { localStorage.clear(); window.location.reload(); }

        init();
    </script>
</body>
</html>
