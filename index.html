<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlassOS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #007AFF;
            --bg-url: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            overflow: hidden;
        }

        /* The Wallpaper Background */
        .wallpaper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-url);
            background-size: cover;
            background-position: center;
            filter: brightness(0.8);
            z-index: -1;
        }

        /* iPhone Frame */
        .iphone {
            width: 375px;
            height: 812px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            color: white;
        }

        /* Dynamic Island / Nav Box */
        .island {
            width: 120px;
            height: 36px;
            background: #000;
            margin: 12px auto;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            padding: 0 10px;
        }

        .island:hover { width: 300px; }

        .tab-link {
            font-size: 11px;
            color: #888;
            cursor: pointer;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .island:hover .tab-link { opacity: 1; }

        /* Screens */
        .screen {
            flex: 1;
            padding: 25px;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        p { font-size: 14px; opacity: 0.7; }

        .chat-area {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            margin: 15px 0;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
        }
        .bubble.me { background: var(--accent); align-self: flex-end; }
        .bubble.them { background: rgba(255,255,255,0.1); align-self: flex-start; }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            outline: none;
            margin-bottom: 10px;
        }

        .btn {
            background: #fff;
            color: #000;
            padding: 14px;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-blue { background: var(--accent); color: white; }

        .warning-card {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid rgba(255, 69, 58, 0.3);
            padding: 15px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="wallpaper"></div>

<div class="iphone">
    <div class="island">
        <div class="tab-link" onclick="switchTab('home')">Home</div>
        <div class="tab-link" onclick="switchTab('chat')">Chat</div>
        <div class="tab-link" onclick="switchTab('webhook')">Tools</div>
        <div class="tab-link" onclick="switchTab('settings')">Settings</div>
    </div>

    <div id="home" class="screen active">
        <h1>Welcome.</h1>
        <p>Your local GlassOS environment is ready.</p>
        <div style="margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="btn" onclick="switchTab('chat')">Open Chat</div>
            <div class="btn" onclick="switchTab('webhook')">Webhooks</div>
        </div>
    </div>

    <div id="chat" class="screen">
        <h1>Chat</h1>
        <div class="chat-area" id="chatLogs">
            <div class="bubble them">System: Logged in locally.</div>
        </div>
        <input type="text" id="chatInput" placeholder="Message...">
        <button class="btn btn-blue" onclick="sendLocalMessage()">Send</button>
    </div>

    <div id="webhook" class="screen">
        <h1>Webhook</h1>
        <p>Send warning messages to target URLs.</p>
        <input type="text" id="hookUrl" placeholder="Webhook URL">
        <select id="hookAction">
            <option value="scam">Scam Warning</option>
            <option value="test">Health Check</option>
            <option value="custom">Custom Message</option>
        </select>
        <input type="text" id="customMsg" placeholder="Custom message (if selected)">
        <button class="btn btn-blue" onclick="executeWebhook()">Connect & Run</button>
        
        <div class="warning-card">
            <b>NOTICE:</b> This tool is for educational purposes and fighting bad actors. Misuse is prohibited.
        </div>
    </div>

    <div id="settings" class="screen">
        <h1>Settings</h1>
        <label>Wallpaper URL</label>
        <input type="text" id="wallUrl" placeholder="Image URL..." onchange="updateWallpaper(this.value)">
        <button class="btn" onclick="localStorage.clear(); location.reload();">Reset OS</button>
    </div>
</div>

<script>
    // Navigation Logic
    function switchTab(tabId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    // Local Chat Logic
    function sendLocalMessage() {
        const input = document.getElementById('chatInput');
        const logs = document.getElementById('chatLogs');
        if(!input.value) return;

        const msg = document.createElement('div');
        msg.className = "bubble me";
        msg.innerText = input.value;
        logs.appendChild(msg);
        
        input.value = "";
        logs.scrollTop = logs.scrollHeight;

        // Auto-reply simulation
        setTimeout(() => {
            const reply = document.createElement('div');
            reply.className = "bubble them";
            reply.innerText = "Local Echo: Message received.";
            logs.appendChild(reply);
            logs.scrollTop = logs.scrollHeight;
        }, 1000);
    }

    // Webhook Execution
    async function executeWebhook() {
        const url = document.getElementById('hookUrl').value;
        const action = document.getElementById('hookAction').value;
        const custom = document.getElementById('customMsg').value;

        if(!url) { alert("Please enter a URL"); return; }

        let content = "";
        if(action === 'scam') content = "⚠️ ALERT: This endpoint has been flagged for scamming activity. Cease operations.";
        else if(action === 'test') content = "System test: Webhook connection active.";
        else content = custom || "No content provided.";

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: content })
            });
            if(res.ok) alert("Execution Successful");
            else alert("Execution Failed: " + res.status);
        } catch(e) {
            alert("Error: Invalid URL or CORS block.");
        }
    }

    // Wallpaper Logic
    function updateWallpaper(url) {
        if(!url) return;
        document.documentElement.style.setProperty('--bg-url', `url('${url}')`);
        localStorage.setItem('os-wallpaper', url);
    }

    // Load saved wallpaper
    window.onload = () => {
        const saved = localStorage.getItem('os-wallpaper');
        if(saved) updateWallpaper(saved);
    }
</script>

</body>
</html>
